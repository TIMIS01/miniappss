<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🛍️ PREMIUM SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Все стили из предыдущего варианта (без изменений) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #1a1a1a;
            --text-secondary: #6c757d;
            --accent: #4361ee;
            --accent-light: #e9ecef;
            --success: #4CAF50;
            --danger: #f44336;
            --border: #dee2e6;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1a1a1a;
                --bg-secondary: #2d2d2d;
                --text-primary: #ffffff;
                --text-secondary: #a0a0a0;
                --accent: #6c8cff;
                --accent-light: #404040;
                --border: #404040;
                --shadow: 0 10px 30px rgba(0,0,0,0.3);
            }
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        .city-card {
            background: var(--gradient);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s;
            color: white;
        }

        .city-card:active {
            transform: scale(0.98);
        }

        .city-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .city-value {
            font-size: 28px;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .city-value span:last-child {
            font-size: 18px;
            opacity: 0.8;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 30px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
        }

        .close-btn:hover {
            background: var(--bg-secondary);
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .city-item {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .city-item.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 10px 20px -5px var(--accent);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin: 20px 0;
        }

        .product-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid var(--border);
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .product-image {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .product-info {
            padding: 16px;
        }

        .product-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .product-price {
            color: var(--accent);
            font-weight: 800;
            font-size: 20px;
        }

        .product-price::before {
            content: '₽';
            font-size: 14px;
            opacity: 0.7;
            margin-right: 2px;
        }

        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 28px;
            cursor: pointer;
            padding: 0 10px 0 0;
            line-height: 1;
        }

        .nav-title {
            font-weight: 700;
            font-size: 18px;
            flex: 1;
        }

        .detail-card {
            background: var(--bg-secondary);
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .detail-image {
            width: 100%;
            height: 250px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }

        .detail-content {
            padding: 24px;
        }

        .detail-name {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .detail-price {
            font-size: 36px;
            font-weight: 900;
            color: var(--accent);
        }

        .detail-price::before {
            content: '₽';
            font-size: 24px;
            opacity: 0.7;
            margin-right: 4px;
        }

        .quantity-section {
            background: var(--bg-secondary);
            border-radius: 30px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .section-label {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label span {
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }

        .quantity-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .qty-btn {
            flex: 1;
            min-width: 70px;
            padding: 16px 8px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-primary);
            transition: 0.2s;
        }

        .qty-btn.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .promo-section {
            background: var(--bg-secondary);
            border-radius: 30px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .promo-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .promo-input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 20px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .promo-input:focus {
            border-color: var(--accent);
        }

        .promo-apply-btn {
            padding: 16px 28px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            white-space: nowrap;
        }

        .promo-apply-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .promo-status {
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .promo-status.success {
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
            border: 1px solid #4CAF50;
            display: block;
        }

        .promo-status.error {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border: 1px solid #f44336;
            display: block;
        }

        .promo-status.info {
            background: rgba(67, 97, 238, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            display: block;
        }

        .total-price {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: var(--gradient);
            border-radius: 30px;
            color: white;
            box-shadow: 0 15px 30px -10px var(--accent);
        }

        .price-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .old-price {
            text-decoration: line-through;
            opacity: 0.7;
            font-size: 24px;
            font-weight: 600;
        }

        .discount-badge {
            background: rgba(255, 255, 255, 0.25);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .confirmation {
            text-align: center;
            padding: 20px;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: scaleIn 0.5s;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .order-details {
            background: var(--bg-secondary);
            border-radius: 30px;
            padding: 24px;
            margin: 24px 0;
            text-align: left;
            border: 1px solid var(--border);
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .order-row:last-child {
            border-bottom: none;
        }

        .order-label {
            opacity: 0.7;
            font-weight: 500;
        }

        .order-value {
            font-weight: 700;
            font-size: 18px;
        }

        .discount-info {
            color: var(--success);
            font-weight: 700;
            font-size: 18px;
            margin: 20px 0;
            padding: 12px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 16px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Модальное окно выбора города -->
    <div class="modal" id="cityModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🏙️ Выберите город</h3>
                <button class="close-btn" id="closeCityModal">✕</button>
            </div>
            <div class="cities-grid" id="citiesGrid"></div>
            <button class="btn btn-primary" id="confirmCity">Подтвердить выбор</button>
        </div>
    </div>

    <!-- Главный экран -->
    <div id="mainScreen">
        <div class="city-card" id="citySelector">
            <div class="city-label">
                <span>📍 ТВОЙ ГОРОД</span>
            </div>
            <div class="city-value">
                <span id="selectedCity">Москва</span>
                <span>▼</span>
            </div>
        </div>

        <button class="btn btn-secondary" id="contactAdminMain">
            <span>📞</span> Связаться с администратором
        </button>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Экран товара -->
    <div id="productScreen" class="hidden">
        <div class="nav-bar">
            <button class="back-btn" id="backToCatalog">←</button>
            <span class="nav-title" id="productNavTitle">Товар</span>
        </div>
        
        <div class="detail-card">
            <div class="detail-image" id="productDetailImage"></div>
            <div class="detail-content">
                <div class="detail-name" id="productDetailName">Название</div>
                <div class="detail-price" id="productDetailPrice">0</div>
            </div>
        </div>

        <div class="quantity-section">
            <div class="section-label">
                📦 Количество
                <span>грамм</span>
            </div>
            <div class="quantity-buttons" id="quantityButtons"></div>
        </div>

        <div class="promo-section">
            <div class="section-label">🏷️ Промокод</div>
            <div class="promo-input-group">
                <input type="text" class="promo-input" id="promoInput" placeholder="Введите промокод" maxlength="20">
                <button class="promo-apply-btn" id="applyPromo">Применить</button>
            </div>
            <div class="promo-status" id="promoStatus"></div>
        </div>

        <div class="total-price" id="totalPrice">
            <div class="price-container">
                <span>0 ₽</span>
            </div>
        </div>

        <button class="btn btn-primary" id="orderBtn">
            ✅ Оформить заказ
        </button>
        <button class="btn btn-secondary" id="contactAdminProduct">
            📞 Связаться с администратором
        </button>
        <button class="btn btn-secondary" id="continueShoppingBtn">
            ⬅️ Продолжить покупки
        </button>
    </div>

    <!-- Экран подтверждения -->
    <div id="confirmationScreen" class="hidden">
        <div class="confirmation">
            <div class="success-icon">🎉</div>
            <h2>Заказ оформлен!</h2>
            
            <div class="order-details" id="orderDetails"></div>
            <div class="total-price" id="orderTotal">0 ₽</div>
            <div id="orderDiscount" class="discount-info"></div>

            <button class="btn btn-primary" id="continueAfterOrder">
                Продолжить покупки
            </button>
            <button class="btn btn-secondary" id="contactAfterOrder">
                📞 Связаться с администратором
            </button>
        </div>
    </div>

    <script>
        // ===== ИНИЦИАЛИЗАЦИЯ TELEGRAM =====
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        if (tg.disableClosingConfirmation) {
            tg.disableClosingConfirmation();
        }

        // ===== ПОЛУЧАЕМ ID ПОЛЬЗОВАТЕЛЯ =====
        const userId = tg.initDataUnsafe?.user?.id;
        console.log('User ID:', userId);

        // ===== ТОКЕН БОТА (замените на свой) =====
        const BOT_TOKEN = '8650034473:AAHOoD4BmYUBTrJCG1o2y8fMjabNIZN3hm8';
        const TELEGRAM_API_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

        // ===== ДАННЫЕ =====
        const CITIES = [
            "Москва", "Санкт-Петербург", "Новосибирск", "Екатеринбург", "Казань",
            "Нижний Новгород", "Челябинск", "Самара", "Омск", "Ростов-на-Дону",
            "Уфа", "Красноярск", "Воронеж", "Пермь", "Волгоград"
        ];

        const PRODUCTS = [
            { id: 1, name: "Шишки", emoji: "🌰", price: 3000, image: "images/Shishka.png", bgColor: "#43A047" },
            { id: 2, name: "Гашиш", emoji: "🪴", price: 3600, image: "images/Gash.png", bgColor: "#7B5E3B" },
            { id: 3, name: "Амфетамин", emoji: "💊", price: 2200, image: "images/amf.png", bgColor: "#E53935" },
            { id: 4, name: "Экстази", emoji: "🍃", price: 1200, image: "images/Eks.png", bgColor: "#8E24AA" },
            { id: 5, name: "Меф", emoji: "🧂", price: 1700, image: "images/Mef.png", bgColor: "#FB8C00" },
            { id: 6, name: "А-кристалл", emoji: "💎", price: 5500, image: "images/Cry.png", bgColor: "#1E88E5" },
            { id: 7, name: "Психотропные грибы", emoji: "🍄", price: 500, image: "images/Mush.png", bgColor: "#6D4C41" },
            { id: 8, name: "Лирика", emoji: "💧", price: 8000, image: "images/Lyr.png", bgColor: "#039BE5" }
        ];

        // ===== СОСТОЯНИЕ =====
        let state = {
            city: localStorage.getItem('selectedCity') || 'Москва',
            selectedProduct: null,
            quantity: 1,
            appliedPromo: null,
            pendingRequests: {}
        };

        // ===== ВОССТАНОВЛЕНИЕ СКИДКИ ИЗ LOCALSTORAGE =====
        function loadStoredPromo() {
            const stored = localStorage.getItem('activePromo');
            if (stored) {
                try {
                    const promo = JSON.parse(stored);
                    // Проверяем, не устарел ли промокод (например, 1 час)
                    const age = Date.now() - promo.timestamp;
                    const maxAge = 60 * 60 * 1000; // 1 час
                    if (age < maxAge) {
                        state.appliedPromo = {
                            code: promo.code,
                            discount: promo.discount
                        };
                        console.log('✅ Восстановлен промокод из localStorage:', promo.code);
                    } else {
                        localStorage.removeItem('activePromo');
                    }
                } catch (e) {
                    localStorage.removeItem('activePromo');
                }
            }
        }

        // ===== СОХРАНЕНИЕ ПРОМОКОДА В LOCALSTORAGE =====
        function savePromoToStorage(code, discount) {
            const promo = {
                code: code,
                discount: discount,
                timestamp: Date.now()
            };
            localStorage.setItem('activePromo', JSON.stringify(promo));
        }

        // ===== УДАЛЕНИЕ ПРОМОКОДА ИЗ STORAGE =====
        function clearStoredPromo() {
            localStorage.removeItem('activePromo');
        }

        // ===== ГОРОДА =====
        function renderCities() {
            const grid = document.getElementById('citiesGrid');
            grid.innerHTML = CITIES.map(city => `
                <div class="city-item ${city === state.city ? 'selected' : ''}" 
                     onclick="selectCity('${city}')">
                    ${city}
                </div>
            `).join('');
        }

        window.selectCity = function(city) {
            state.city = city;
            document.querySelectorAll('.city-item').forEach(el => {
                if (el.textContent.trim() === city) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
        };

        function openCityModal() {
            renderCities();
            document.getElementById('cityModal').classList.add('show');
        }

        function closeCityModal() {
            document.getElementById('cityModal').classList.remove('show');
        }

        // ===== ТОВАРЫ =====
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = PRODUCTS.map(product => {
                return `
                <div class="product-card" onclick="selectProduct(${product.id})">
                    <div class="product-image" style="background: ${product.bgColor}; display: flex; align-items: center; justify-content: center;">
                        <span style="font-size: 48px;">${product.emoji}</span>
                    </div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price.toLocaleString()}</div>
                    </div>
                </div>
            `}).join('');
        }

        window.selectProduct = function(id) {
            state.selectedProduct = PRODUCTS.find(p => p.id === id);
            state.quantity = 1;
            
            // Не сбрасываем appliedPromo при смене товара, чтобы скидка оставалась
            // Но если нужно сбрасывать, раскомментируйте:
            // state.appliedPromo = null;
            
            const product = state.selectedProduct;
            
            document.getElementById('productDetailImage').innerHTML = `<span>${product.emoji}</span>`;
            document.getElementById('productDetailImage').style.background = product.bgColor;
            
            document.getElementById('productDetailName').textContent = product.name;
            document.getElementById('productDetailPrice').textContent = product.price.toLocaleString();
            document.getElementById('productNavTitle').textContent = product.name;
            
            const qtyContainer = document.getElementById('quantityButtons');
            qtyContainer.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                const btn = document.createElement('button');
                btn.className = `qty-btn ${i === 1 ? 'selected' : ''}`;
                btn.textContent = i + 'г';
                btn.onclick = () => setQuantity(i);
                qtyContainer.appendChild(btn);
            }
            
            document.getElementById('promoInput').value = '';
            document.getElementById('promoStatus').style.display = 'none';
            
            updatePrice();
            
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('productScreen').classList.remove('hidden');
        };

        function setQuantity(qty) {
            state.quantity = qty;
            document.querySelectorAll('.qty-btn').forEach((btn, i) => {
                if (i + 1 === qty) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
            updatePrice();
        }

        function updatePrice() {
            if (!state.selectedProduct) return;
            
            const baseTotal = state.selectedProduct.price * state.quantity;
            let finalTotal = baseTotal;
            
            const priceDiv = document.getElementById('totalPrice');
            
            if (state.appliedPromo) {
                const discountAmount = Math.round(baseTotal * state.appliedPromo.discount / 100);
                finalTotal = baseTotal - discountAmount;
                
                priceDiv.innerHTML = `
                    <div class="price-container">
                        <span class="old-price">${baseTotal.toLocaleString()} ₽</span>
                        <span>${finalTotal.toLocaleString()} ₽</span>
                        <span class="discount-badge">-${state.appliedPromo.discount}%</span>
                    </div>
                `;
            } else {
                priceDiv.innerHTML = `
                    <div class="price-container">
                        <span>${baseTotal.toLocaleString()} ₽</span>
                    </div>
                `;
            }
        }

        // ===== ПРОМОКОДЫ =====
        async function applyPromo() {
    const input = document.getElementById('promoInput');
    const code = input.value.trim().toUpperCase();
    const statusDiv = document.getElementById('promoStatus');
    const applyBtn = document.getElementById('applyPromo');

    if (!code) {
        showPromoStatus('Введите промокод', 'error');
        return;
    }

    if (!state.selectedProduct) {
        showPromoStatus('Сначала выберите товар', 'error');
        return;
    }

    applyBtn.disabled = true;
    showPromoStatus('Проверка промокода...', 'info');

    const requestId = Date.now() + '_' + Math.random().toString(36);

    state.pendingRequests[requestId] = (response) => {
        delete state.pendingRequests[requestId];
        applyBtn.disabled = false;
        if (response.success) {
            state.appliedPromo = {
                code: code,
                discount: response.discount
            };
            savePromoToStorage(code, response.discount);
            showPromoStatus(`✅ Промокод применен! Скидка ${response.discount}%`, 'success');
            updatePrice();
        } else {
            showPromoStatus(response.error || '❌ Неверный промокод', 'error');
            state.appliedPromo = null;
            clearStoredPromo();
            updatePrice();
        }
    };

    if (userId) {
        // Есть ID – используем HTTP (без закрытия)
        const messageData = {
            action: 'check_promo',
            requestId: requestId,
            userId: userId,
            code: code,
            productId: state.selectedProduct.id
        };

        fetch(TELEGRAM_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: userId,
                text: JSON.stringify(messageData)
            })
        })
        .then(response => response.json())
        .then(result => {
            if (!result.ok) throw new Error(result.description);
            console.log('✅ Запрос на проверку промокода отправлен');
        })
        .catch(error => {
            console.error('❌ Ошибка HTTP:', error);
            showPromoStatus('❌ Ошибка соединения', 'error');
            applyBtn.disabled = false;
            delete state.pendingRequests[requestId];
        });

        setTimeout(() => {
            if (state.pendingRequests[requestId]) {
                delete state.pendingRequests[requestId];
                applyBtn.disabled = false;
                showPromoStatus('❌ Таймаут ответа от бота', 'error');
            }
        }, 10000);
    } else {
        // Нет ID – используем sendData (с закрытием, но для теста)
        const data = {
            action: 'check_promo',
            requestId: requestId,
            code: code,
            productId: state.selectedProduct.id
        };
        tg.sendData(JSON.stringify(data));
        // При использовании sendData приложение закроется, поэтому не ждём ответа.
        // Однако мы не можем показать результат здесь. В реальности, если userId нет,
        // то это тестовый режим, и мы просто надеемся, что бот ответит.
        showPromoStatus('⏳ Запрос отправлен, приложение закроется...', 'info');
        // Через некоторое время снимем блокировку, но пользователь уже уйдёт.
        setTimeout(() => {
            applyBtn.disabled = false;
            if (state.pendingRequests[requestId]) {
                delete state.pendingRequests[requestId];
            }
        }, 5000);
    }
}
        function showPromoStatus(msg, type) {
            const status = document.getElementById('promoStatus');
            status.className = `promo-status ${type}`;
            status.textContent = msg;
            status.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 3000);
            }
        }

        // ===== ЗАКАЗ =====
        function placeOrder() {
            if (!state.selectedProduct) return;
            
            const baseTotal = state.selectedProduct.price * state.quantity;
            const finalTotal = state.appliedPromo 
                ? baseTotal - Math.round(baseTotal * state.appliedPromo.discount / 100)
                : baseTotal;
            
            const orderData = {
                action: 'order',
                userId: userId || 0,
                productId: state.selectedProduct.id,
                productName: state.selectedProduct.name,
                quantity: state.quantity,
                basePrice: state.selectedProduct.price,
                baseTotal: baseTotal,
                finalTotal: finalTotal,
                city: state.city,
                promoCode: state.appliedPromo?.code || null,
                discount: state.appliedPromo?.discount || 0
            };
            
            console.log('📦 Отправка заказа:', orderData);
            
            // Показываем подтверждение
            document.getElementById('productScreen').classList.add('hidden');
            document.getElementById('confirmationScreen').classList.remove('hidden');
            
            // Заполняем детали
            let discountHtml = '';
            if (state.appliedPromo) {
                discountHtml = `
                    <div class="order-row">
                        <span class="order-label">🏷️ Промокод:</span>
                        <span class="order-value">${state.appliedPromo.code} (-${state.appliedPromo.discount}%)</span>
                    </div>
                    <div class="order-row">
                        <span class="order-label">💰 Экономия:</span>
                        <span class="order-value">${(baseTotal - finalTotal).toLocaleString()} ₽</span>
                    </div>
                `;
            }
            
            document.getElementById('orderDetails').innerHTML = `
                <div class="order-row">
                    <span class="order-label">🏙️ Город:</span>
                    <span class="order-value">${state.city}</span>
                </div>
                <div class="order-row">
                    <span class="order-label">📦 Товар:</span>
                    <span class="order-value">${state.selectedProduct.name}</span>
                </div>
                <div class="order-row">
                    <span class="order-label">📊 Количество:</span>
                    <span class="order-value">${state.quantity} г</span>
                </div>
                <div class="order-row">
                    <span class="order-label">💰 Цена за г:</span>
                    <span class="order-value">${state.selectedProduct.price.toLocaleString()} ₽</span>
                </div>
                ${discountHtml}
            `;
            
            document.getElementById('orderTotal').innerHTML = `${finalTotal.toLocaleString()} ₽`;
            
            if (state.appliedPromo) {
                document.getElementById('orderDiscount').innerHTML = 
                    `🎉 Промокод ${state.appliedPromo.code} применен! Скидка ${state.appliedPromo.discount}%`;
            } else {
                document.getElementById('orderDiscount').innerHTML = '';
            }
            
            // Отправляем заказ (sendData закроет приложение)
            tg.sendData(JSON.stringify(orderData));
        }

        // ===== СВЯЗЬ С АДМИНОМ =====
        function contactAdmin() {
            const data = {
                action: 'contact_admin',
                userId: userId || 0,
                city: state.city
            };
            
            tg.sendData(JSON.stringify(data));
            
            tg.showPopup({
                title: '📞 Запрос отправлен',
                message: 'Администратор свяжется с вами',
                buttons: [{ type: 'ok' }]
            });
        }

        // ===== НАВИГАЦИЯ =====
        function goToMain() {
            document.getElementById('productScreen').classList.add('hidden');
            document.getElementById('confirmationScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            // Не сбрасываем appliedPromo при возврате в каталог
        }

        // ===== ОБРАБОТКА ОТВЕТОВ ОТ БОТА =====
        function handleBotMessage(event) {
            console.log('📩 Получен ответ от бота:', event);
            try {
                const data = JSON.parse(event.data);
                if (data.action === 'promo_response' && data.requestId) {
                    if (state.pendingRequests[data.requestId]) {
                        state.pendingRequests[data.requestId](data);
                    }
                }
            } catch (e) {
                console.log('Не удалось распарсить ответ:', e);
            }
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function init() {
            console.log('🚀 Запуск приложения');
            
            // Восстанавливаем промокод из localStorage
            loadStoredPromo();
            
            document.getElementById('selectedCity').textContent = state.city;
            document.getElementById('citySelector').addEventListener('click', openCityModal);
            document.getElementById('closeCityModal').addEventListener('click', closeCityModal);
            document.getElementById('confirmCity').addEventListener('click', () => {
                localStorage.setItem('selectedCity', state.city);
                document.getElementById('selectedCity').textContent = state.city;
                closeCityModal();
            });
            
            document.getElementById('cityModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('cityModal')) {
                    closeCityModal();
                }
            });
            
            renderProducts();
            
            document.getElementById('contactAdminMain').addEventListener('click', contactAdmin);
            document.getElementById('contactAdminProduct').addEventListener('click', contactAdmin);
            document.getElementById('contactAfterOrder').addEventListener('click', contactAdmin);
            
            document.getElementById('backToCatalog').addEventListener('click', goToMain);
            document.getElementById('continueShoppingBtn').addEventListener('click', goToMain);
            document.getElementById('continueAfterOrder').addEventListener('click', goToMain);
            
            document.getElementById('applyPromo').addEventListener('click', applyPromo);
            document.getElementById('promoInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') applyPromo();
            });
            
            document.getElementById('orderBtn').addEventListener('click', placeOrder);
            
            tg.onEvent('message', handleBotMessage);
            
            console.log('✅ Приложение готово');
        }

        init();
    </script>
</body>
</html>
