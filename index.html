<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ Магазин Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --tg-color-scheme: light;
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #999999;
            --tg-theme-link-color: #2481cc;
            --tg-theme-button-color: #40a7e3;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #f0f0f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --tg-theme-bg-color: #1f1f1f;
                --tg-theme-text-color: #ffffff;
                --tg-theme-hint-color: #aaaaaa;
                --tg-theme-link-color: #5f9cea;
                --tg-theme-button-color: #5f9cea;
                --tg-theme-button-text-color: #ffffff;
                --tg-theme-secondary-bg-color: #2c2c2c;
            }
        }

        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .city-header {
            background: linear-gradient(135deg, var(--tg-theme-button-color), #5f9cea);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(64, 167, 227, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .city-header:active {
            transform: scale(0.98);
        }

        .city-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 4px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .city-name {
            font-size: 28px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .change-city-icon {
            font-size: 18px;
            opacity: 0.8;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .city-modal {
            background: var(--tg-theme-bg-color);
            border-radius: 30px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.show .city-modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--tg-theme-text-color);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .city-item {
            padding: 14px 8px;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .city-item.selected {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .city-item:active {
            transform: scale(0.95);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .product-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: var(--tg-theme-bg-color);
        }

        .product-info {
            padding: 12px;
        }

        .product-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .product-price {
            color: var(--tg-theme-button-color);
            font-weight: 700;
            font-size: 13px;
        }

        .product-detail {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .detail-content {
            padding: 20px;
        }

        .detail-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .detail-price {
            font-size: 16px;
            font-weight: 600;
            color: var(--tg-theme-button-color);
            margin-bottom: 24px;
        }

        /* ========== ГАЛЕРЕЯ ========== */
        .detail-image-container {
            position: relative;
            width: 100%;
            height: 250px;
            overflow: hidden;
            background: var(--tg-theme-secondary-bg-color);
        }
        .detail-image-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .detail-image-slide.active {
            opacity: 1;
        }
        .slider-prev, .slider-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .slider-prev { left: 10px; }
        .slider-next { right: 10px; }
        .slider-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            cursor: pointer;
        }
        .dot.active {
            background: white;
        }
        .product-description {
            font-size: 14px;
            margin: 16px 0;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 16px;
            white-space: pre-wrap;
        }

        /* ========== ПЛАТЕЖНАЯ КАРТОЧКА ========== */
        .payment-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 2px solid var(--tg-theme-button-color);
        }
        .payment-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--tg-theme-button-color);
        }
        .payment-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.2);
        }
        .payment-row:last-of-type {
            border-bottom: none;
        }
        .payment-label {
            opacity: 0.7;
        }
        .payment-value {
            font-weight: 600;
        }
        .payment-total {
            font-size: 24px;
            font-weight: 800;
            color: var(--tg-theme-button-color);
            text-align: center;
            margin: 20px 0;
        }
        .payment-button {
            background: #34c759;
            color: white;
            border: none;
            border-radius: 18px;
            padding: 16px;
            font-weight: 700;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .payment-button:active {
            opacity: 0.8;
        }
        .payment-note {
            font-size: 12px;
            opacity: 0.6;
            text-align: center;
            margin-top: 12px;
        }

        .promo-section {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .promo-input-group {
            display: flex;
            gap: 8px;
        }

        .promo-input {
            flex: 1;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--tg-theme-hint-color);
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 14px;
        }

        .promo-button {
            width: auto;
            padding: 12px 20px;
            margin: 0;
        }

        .promo-message {
            font-size: 12px;
            margin-top: 8px;
            color: var(--tg-theme-hint-color);
        }

        .button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }

        .button:active {
            opacity: 0.8;
        }

        .button-primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .button-secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        .confirmation-screen {
            text-align: center;
            padding: 20px 20px 30px;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 16px;
            animation: scaleIn 0.5s;
        }

        .order-details {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .order-detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        }

        .order-detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            opacity: 0.7;
        }

        .detail-value {
            font-weight: 600;
        }

        .total-amount {
            font-size: 28px;
            font-weight: 800;
            color: var(--tg-theme-button-color);
            margin: 20px 0;
        }

        .contact-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed rgba(128, 128, 128, 0.3);
        }

        .contact-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tg-theme-button-color);
        }

        .contact-buttons {
            display: flex;
            gap: 10px;
        }

        .contact-button {
            flex: 1;
            padding: 14px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
        }

        .contact-button:active {
            transform: scale(0.95);
        }

        .contact-button.primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .contact-button.secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .hidden {
            display: none !important;
        }

        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .back-button {
            background: none;
            border: none;
            color: var(--tg-theme-button-color);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            margin-right: 8px;
        }

        .save-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: var(--tg-theme-hint-color);
        }

        .spinner {
            border: 3px solid var(--tg-theme-secondary-bg-color);
            border-top: 3px solid var(--tg-theme-button-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="modal-overlay" id="city-modal-overlay">
        <div class="city-modal">
            <div class="modal-header">
                <div class="modal-title">🏙️ Выберите город</div>
                <button class="close-modal" id="close-modal-btn">&times;</button>
            </div>
            <div class="cities-grid" id="cities-grid"></div>
            <button class="button button-primary" id="confirm-city-btn">Подтвердить</button>
        </div>
    </div>

    <div id="main-screen">
        <div class="city-header" id="city-header">
            <div class="city-title">
                <span>🏙️ ВАШ ГОРОД</span>
                <span class="change-city-icon">▼</span>
            </div>
            <div class="city-name" id="city-display">
                <span id="city-name-text">ЗАГРУЗКА...</span>
                <span class="save-indicator" id="save-indicator" style="display: none;"></span>
            </div>
        </div>

        <button class="button button-secondary" id="contact-admin-main" style="margin-bottom: 20px;">
            📞 Связаться с администратором
        </button>

        <div id="products-grid" class="products-grid">
            <div class="loading">
                <div class="spinner"></div>
                Загрузка товаров...
            </div>
        </div>
    </div>

    <div id="product-screen" class="hidden">
        <div class="nav-bar">
            <button class="back-button" id="back-to-catalog">←</button>
            <span class="nav-title" id="product-nav-title">Товар</span>
        </div>
        
        <div class="product-detail">
            <div class="detail-image-container" id="detail-image-container"></div>
            <div class="detail-content">
                <div class="detail-title" id="detail-title">Название</div>
                <div class="detail-price" id="detail-price">0 ₽</div>
                <div class="product-description" id="detail-description"></div>
            </div>
        </div>

        <!-- ПЛАТЕЖНАЯ КАРТОЧКА (изначально скрыта) -->
        <div id="payment-card" class="payment-card hidden">
            <div class="payment-title">💳 Детали заказа</div>
            <div class="payment-row">
                <span class="payment-label">Товар:</span>
                <span class="payment-value" id="payment-product">-</span>
            </div>
            <div class="payment-row">
                <span class="payment-label">Город:</span>
                <span class="payment-value" id="payment-city">-</span>
            </div>
            <div class="payment-row">
                <span class="payment-label">Скидка:</span>
                <span class="payment-value" id="payment-discount">0 ₽</span>
            </div>
            <div class="payment-total" id="payment-total">0 ₽</div>
            <button class="payment-button" id="pay-now-btn">💵 Оплатить заказ</button>
            <div class="payment-note">🔒 Оплата происходит через защищённое соединение Telegram</div>
        </div>

        <div class="promo-section">
            <div class="quantity-label">🎫 Промокод</div>
            <div class="promo-input-group">
                <input type="text" id="promo-code-input" class="promo-input" placeholder="Введите промокод">
                <button id="apply-promo-btn" class="button button-secondary promo-button">Применить</button>
            </div>
            <div id="promo-message" class="promo-message"></div>
        </div>

        <button class="button button-primary" id="order-btn">✅ Купить</button>
        <button class="button button-secondary" id="contact-admin-from-product">📞 Связаться с администратором</button>
        <button class="button button-secondary" id="back-to-catalog-from-detail">⬅️ Продолжить покупки</button>
    </div>

    <div id="confirmation-screen" class="hidden">
        <div class="confirmation-screen">
            <div class="success-icon">🎉</div>
            <h2>Заказ отправлен!</h2>
            
            <div class="order-details" id="order-details"></div>
            <div class="total-amount" id="confirmation-total">0 ₽</div>

            <div class="contact-section">
                <div class="contact-title">📞 Нужна помощь с заказом?</div>
                <div class="contact-buttons">
                    <div class="contact-button primary" id="contact-admin-after-order">
                        Написать администратору
                    </div>
                    <div class="contact-button secondary" id="continue-shopping-after-order">
                        Продолжить покупки
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Telegram Web App инициализация
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // ========== ПОЛУЧЕНИЕ ДАННЫХ ПОЛЬЗОВАТЕЛЯ ==========
        function getUserData() {
            let user = {};
            try {
                user = tg.initDataUnsafe?.user || {};
                console.log('🔍 initDataUnsafe.user:', user);
            } catch(e) {
                console.warn('Ошибка чтения initDataUnsafe:', e);
            }
            
            if (user && user.id) {
                console.log('✅ Данные пользователя из Telegram:', user);
                return {
                    id: user.id,
                    username: user.username || null,
                    first_name: user.first_name || 'Пользователь',
                    last_name: user.last_name || '',
                    language_code: user.language_code || 'ru',
                    is_premium: user.is_premium || false
                };
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');
            const username = urlParams.get('username');
            const firstName = urlParams.get('first_name');
            const lastName = urlParams.get('last_name');
            
            if (userId && userId !== 'null' && userId !== 'undefined') {
                console.log('📌 Данные пользователя из URL:', { userId, username, firstName });
                return {
                    id: parseInt(userId),
                    username: username || null,
                    first_name: firstName || 'Пользователь',
                    last_name: lastName || '',
                    language_code: 'ru',
                    is_premium: false,
                    is_from_url: true
                };
            }
            
            console.warn('⚠️ Не удалось получить данные пользователя, используется тестовый пользователь');
            return {
                id: 8562390004,
                username: 'TestAdmin',
                first_name: 'Тестовый',
                last_name: 'Админ',
                language_code: 'ru',
                is_premium: false,
                is_test: true
            };
        }

        const telegramUser = getUserData();
        console.log('👤 ИТОГОВЫЙ ПОЛЬЗОВАТЕЛЬ:', telegramUser);
        
        // ========== ДАННЫЕ ==========
        const CITIES = [
            "Москва и область", "Санкт-Петербург", "Новосибирск", "Екатеринбург", "Казань",
            "Нижний Новгород", "Челябинск", "Самара", "Омск", "Ростов-на-Дону",
            "Уфа", "Красноярск", "Воронеж", "Пермь", "Волгоград"
        ];
        
        let PRODUCTS = [];
        
        // ========== СОСТОЯНИЕ ==========
        let state = {
            city: 'Москва и область',
            selectedProduct: null,
            tempSelectedCity: 'Москва и область',
            appliedPromo: null,
            finalPrice: 0
        };
        
        let isProcessing = false;
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function showNotification(message, isError = false) {
            tg.showPopup({
                title: isError ? '❌ Ошибка' : '✅ Успешно',
                message: message,
                buttons: [{ type: 'ok' }]
            });
        }
        
        // ========== ЗАГРУЗКА ТОВАРОВ С СЕРВЕРА ==========
        async function loadProductsFromServer() {
            try {
                console.log('🔄 Загрузка товаров с сервера...');
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch('https://tg-shop-server.onrender.com/api/products', {
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'ok' && data.products && data.products.length > 0) {
                        PRODUCTS = data.products.map(p => ({
                            id: p.id,
                            name: p.name,
                            price: p.price,
                            description: p.description || '',
                            images: p.images || []
                        }));
                        console.log(`✅ Загружено ${PRODUCTS.length} товаров с сервера`);
                        return true;
                    }
                }
                console.log('⚠️ Сервер вернул пустой список');
                PRODUCTS = [];
                return false;
            } catch (error) {
                console.log('❌ Ошибка загрузки товаров:', error);
                PRODUCTS = [];
                return false;
            }
        }
        
        // ========== ГАЛЕРЕЯ ==========
        let currentSlideIndex = 0;

        function changeSlide(direction) {
            const slides = document.querySelectorAll('.detail-image-slide');
            const dots = document.querySelectorAll('.dot');
            if (!slides.length) return;
            slides[currentSlideIndex].classList.remove('active');
            if (dots.length) dots[currentSlideIndex].classList.remove('active');
            currentSlideIndex = (currentSlideIndex + direction + slides.length) % slides.length;
            slides[currentSlideIndex].classList.add('active');
            if (dots.length) dots[currentSlideIndex].classList.add('active');
        }

        function currentSlide(index) {
            const slides = document.querySelectorAll('.detail-image-slide');
            const dots = document.querySelectorAll('.dot');
            if (!slides.length) return;
            slides[currentSlideIndex].classList.remove('active');
            if (dots.length) dots[currentSlideIndex].classList.remove('active');
            currentSlideIndex = index;
            slides[currentSlideIndex].classList.add('active');
            if (dots.length) dots[currentSlideIndex].classList.add('active');
        }
        
        // ========== ПРОМОКОДЫ ==========
        async function applyPromoCode() {
            const promoInput = document.getElementById('promo-code-input');
            const promoMessage = document.getElementById('promo-message');
            const code = promoInput.value.trim();
            
            if (!code) {
                promoMessage.textContent = '❌ Введите промокод';
                promoMessage.style.color = 'red';
                return;
            }
            
            promoMessage.textContent = '⏳ Проверка промокода...';
            promoMessage.style.color = 'var(--tg-theme-hint-color)';
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                
                const response = await fetch(`https://tg-shop-server.onrender.com/api/check-promo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code, userId: telegramUser.id }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                const result = await response.json();
                
                if (result.status === 'ok') {
                    state.appliedPromo = result.promo;
                    
                    // Пересчитываем цену
                    const basePrice = state.selectedProduct.price;
                    const finalPrice = basePrice * (1 - result.promo.value / 100);
                    state.finalPrice = finalPrice;
                    
                    promoMessage.innerHTML = `✅ Промокод применен! Скидка ${result.promo.value}%`;
                    promoMessage.style.color = '#4CAF50';
                    
                    // Обновляем цену в карточке товара
                    document.getElementById('detail-price').textContent = `${finalPrice.toLocaleString()} ₽`;
                    
                    // Если платежная карточка открыта, обновляем данные в ней
                    if (!document.getElementById('payment-card').classList.contains('hidden')) {
                        document.getElementById('payment-discount').textContent = `${(basePrice - finalPrice).toLocaleString()} ₽`;
                        document.getElementById('payment-total').textContent = `${finalPrice.toLocaleString()} ₽`;
                    }
                } else {
                    promoMessage.textContent = `❌ ${result.message}`;
                    promoMessage.style.color = 'red';
                    state.appliedPromo = null;
                    state.finalPrice = state.selectedProduct.price;
                }
            } catch (error) {
                promoMessage.textContent = '❌ Ошибка проверки промокода';
                promoMessage.style.color = 'red';
                state.appliedPromo = null;
                state.finalPrice = state.selectedProduct?.price || 0;
            }
        }
        
        // ========== ФУНКЦИИ ГОРОДА ==========
        function initializeCity() {
            try {
                const savedCity = localStorage.getItem('selected_city');
                if (savedCity && CITIES.includes(savedCity)) {
                    state.city = savedCity;
                    state.tempSelectedCity = savedCity;
                } else {
                    const urlParams = new URLSearchParams(window.location.search);
                    const urlCity = urlParams.get('city');
                    if (urlCity && CITIES.includes(decodeURIComponent(urlCity))) {
                        state.city = decodeURIComponent(urlCity);
                        state.tempSelectedCity = state.city;
                        localStorage.setItem('selected_city', state.city);
                    }
                }
            } catch (e) {
                console.error('Ошибка загрузки города:', e);
            }
            updateCityDisplay();
        }
        
        function updateCityDisplay() {
            const cityElement = document.getElementById('city-name-text');
            if (cityElement) cityElement.textContent = state.city;
        }
        
        function loadCitiesModal() {
            const grid = document.getElementById('cities-grid');
            if (!grid) return;
            grid.innerHTML = CITIES.map(city => `
                <div class="city-item ${city === state.city ? 'selected' : ''}" onclick="selectTempCity('${city}')">
                    ${city}
                </div>
            `).join('');
        }
        
        window.selectTempCity = function(city) {
            state.tempSelectedCity = city;
            document.querySelectorAll('.city-item').forEach(el => {
                if (el.textContent.trim() === city) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
        };
        
        function confirmCity() {
            if (state.tempSelectedCity !== state.city) {
                state.city = state.tempSelectedCity;
                localStorage.setItem('selected_city', state.city);
                updateCityDisplay();
                loadCitiesModal();
                
                const indicator = document.getElementById('save-indicator');
                if (indicator) {
                    indicator.style.display = 'inline-block';
                    setTimeout(() => indicator.style.display = 'none', 2000);
                }
            }
            closeCityModal();
        }
        
        function openCityModal() {
            state.tempSelectedCity = state.city;
            loadCitiesModal();
            document.getElementById('city-modal-overlay').classList.add('show');
        }
        
        function closeCityModal() {
            document.getElementById('city-modal-overlay').classList.remove('show');
        }
        
        // ========== ТОВАРЫ ==========
        function loadProducts() {
            const grid = document.getElementById('products-grid');
            if (!grid) return;
            
            if (!PRODUCTS.length) {
                grid.innerHTML = '<div class="loading"><div class="spinner"></div>Загрузка товаров...</div>';
                return;
            }
            
            grid.innerHTML = PRODUCTS.map(product => `
                <div class="product-card" onclick="selectProduct(${product.id})">
                    <img class="product-image" src="${product.images[0] || ''}" alt="${product.name}" 
                         onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23cccccc%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22%23666%22%3E🖼️%3C%2Ftext%3E%3C%2Fsvg%3E'">
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${product.price.toLocaleString()} ₽</div>
                    </div>
                </div>
            `).join('');
        }
        
        window.selectProduct = function(productId) {
            state.selectedProduct = PRODUCTS.find(p => p.id === productId);
            state.appliedPromo = null;
            state.finalPrice = state.selectedProduct.price;
            
            const container = document.getElementById('detail-image-container');
            if (container) {
                let imagesHtml = '';
                if (state.selectedProduct.images && state.selectedProduct.images.length > 0) {
                    imagesHtml = state.selectedProduct.images.map((img, index) => `
                        <img class="detail-image-slide ${index === 0 ? 'active' : ''}" 
                             src="${img}" 
                             alt="${state.selectedProduct.name}"
                             onerror="this.style.display='none'">
                    `).join('');
                    
                    if (state.selectedProduct.images.length > 1) {
                        imagesHtml += `
                            <div class="slider-dots">
                                ${state.selectedProduct.images.map((_, i) => `
                                    <span class="dot ${i === 0 ? 'active' : ''}" onclick="currentSlide(${i})"></span>
                                `).join('')}
                            </div>
                            <button class="slider-prev" onclick="changeSlide(-1)">❮</button>
                            <button class="slider-next" onclick="changeSlide(1)">❯</button>
                        `;
                    }
                } else {
                    imagesHtml = `<div class="detail-image-slide active" style="background: #ccc; display: flex; align-items: center; justify-content: center; font-size: 48px;">🖼️</div>`;
                }
                container.innerHTML = imagesHtml;
                currentSlideIndex = 0;
            }
            
            document.getElementById('detail-title').textContent = state.selectedProduct.name;
            document.getElementById('detail-price').textContent = `${state.selectedProduct.price.toLocaleString()} ₽`;
            document.getElementById('detail-description').textContent = state.selectedProduct.description || '';
            
            // Скрываем платежную карточку при смене товара
            document.getElementById('payment-card').classList.add('hidden');
            document.getElementById('order-btn').classList.remove('hidden');
            
            // Очищаем промокод
            document.getElementById('promo-code-input').value = '';
            document.getElementById('promo-message').innerHTML = '';
            
            document.getElementById('main-screen')?.classList.add('hidden');
            document.getElementById('product-screen')?.classList.remove('hidden');
        };

// ========== ОТПРАВКА ЗАКАЗА В БОТА ==========
async function sendOrderToBot() {
    if (isProcessing) {
        showNotification('Заказ уже оформляется...');
        return;
    }
    
    if (!state.selectedProduct) {
        showNotification('Выберите товар', true);
        return;
    }
    
    isProcessing = true;
    
    const payBtn = document.getElementById('pay-now-btn');
    const originalText = payBtn?.textContent || 'Оплатить заказ';
    if (payBtn) {
        payBtn.textContent = '⏳ Отправка...';
        payBtn.disabled = true;
    }
    
    try {
        const orderData = {
            action: 'order',
            productId: state.selectedProduct.id,
            productName: state.selectedProduct.name,
            price: state.finalPrice,
            city: state.city,
            userId: telegramUser.id,
            username: telegramUser.username,
            firstName: telegramUser.first_name,
            lastName: telegramUser.last_name,
            fullName: [telegramUser.first_name, telegramUser.last_name].filter(Boolean).join(' ') || 'Пользователь',
            promocode: state.appliedPromo,
            timestamp: new Date().toISOString()
        };
        
        console.log('📦 Отправка заказа в бота:', orderData);
        
        // Отправляем данные в бота через WebApp
        tg.sendData(JSON.stringify(orderData));
        
        // ========== ПОКАЗЫВАЕМ УВЕДОМЛЕНИЕ В MINI APP ==========
        showNotification('✅ Платёжная ссылка направлена в чат бота. Проверьте Telegram.', false);
        
        // Показываем экран подтверждения
        document.getElementById('product-screen')?.classList.add('hidden');
        document.getElementById('confirmation-screen')?.classList.remove('hidden');
        
        const orderDetails = document.getElementById('order-details');
        if (orderDetails) {
            let promoText = '';
            if (state.appliedPromo) {
                promoText = `<div class="order-detail-item">
                    <span class="detail-label">🎫 Промокод:</span>
                    <span class="detail-value">${state.appliedPromo.code} (скидка ${state.appliedPromo.value}%)</span>
                </div>`;
            }
            
            orderDetails.innerHTML = `
                <div class="order-detail-item">
                    <span class="detail-label">👤 Покупатель:</span>
                    <span class="detail-value">${orderData.fullName}</span>
                </div>
                <div class="order-detail-item">
                    <span class="detail-label">🏙️ Город:</span>
                    <span class="detail-value">${state.city}</span>
                </div>
                <div class="order-detail-item">
                    <span class="detail-label">📦 Товар:</span>
                    <span class="detail-value">${state.selectedProduct.name}</span>
                </div>
                ${promoText}
                <div class="order-detail-item">
                    <span class="detail-label">💰 Сумма:</span>
                    <span class="detail-value">${state.finalPrice.toLocaleString()} ₽</span>
                </div>
            `;
        }
        
        const totalAmount = document.getElementById('confirmation-total');
        if (totalAmount) totalAmount.textContent = `${state.finalPrice.toLocaleString()} ₽`;
        
        // Плавно закрываем Mini App через 3 секунды (чтобы пользователь успел прочитать)
    //    setTimeout(() => tg.close(), 3000);
        
    } catch (error) {
        console.error('Ошибка при отправке заказа:', error);
        showNotification('Не удалось отправить заказ. Попробуйте позже.', true);
        isProcessing = false;
        if (payBtn) {
            payBtn.textContent = originalText;
            payBtn.disabled = false;
        }
    }
}
        



        
        // ========== ОФОРМЛЕНИЕ ЗАКАЗА (ПОКАЗ ПЛАТЕЖНОЙ КАРТОЧКИ) ==========
        function showPaymentCard() {
            if (!state.selectedProduct) {
                showNotification('Выберите товар', true);
                return;
            }
            
            const basePrice = state.selectedProduct.price;
            const finalPrice = state.finalPrice;
            const discount = basePrice - finalPrice;
            
            // Заполняем данные в платежной карточке
            document.getElementById('payment-product').textContent = state.selectedProduct.name;
            document.getElementById('payment-city').textContent = state.city;
            document.getElementById('payment-discount').textContent = discount > 0 ? `${discount.toLocaleString()} ₽` : '0 ₽';
            document.getElementById('payment-total').textContent = `${finalPrice.toLocaleString()} ₽`;
            
            // Скрываем кнопку "Купить" и показываем платежную карточку
            document.getElementById('order-btn').classList.add('hidden');
            document.getElementById('payment-card').classList.remove('hidden');
        }
        
        
        
        // ========== СВЯЗЬ С АДМИНИСТРАТОРОМ ==========
        async function contactAdmin() {
            const contactData = {
                action: 'contact_admin',
                city: state.city,
                message: 'Пользователь хочет связаться с администратором',
                userId: telegramUser.id,
                username: telegramUser.username,
                firstName: telegramUser.first_name,
                lastName: telegramUser.last_name,
                fullName: [telegramUser.first_name, telegramUser.last_name].filter(Boolean).join(' ') || 'Пользователь',
                timestamp: new Date().toISOString()
            };
            
            try {
                tg.sendData(JSON.stringify(contactData));
                showNotification('Запрос отправлен администратору!');
            } catch (error) {
                showNotification('Запрос сохранен. Администратор свяжется с вами при следующем входе.');
            }
        }
        
        // ========== НАВИГАЦИЯ ==========
        function goToMainScreen() {
            document.getElementById('product-screen')?.classList.add('hidden');
            document.getElementById('confirmation-screen')?.classList.add('hidden');
            document.getElementById('main-screen')?.classList.remove('hidden');
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        async function init() {
            console.log('🚀 Инициализация Mini App...');
            console.log('👤 Пользователь (данные для заказа):', telegramUser);
            
            initializeCity();
            await loadProductsFromServer();
            loadProducts();
            
            const cityHeader = document.getElementById('city-header');
            if (cityHeader) cityHeader.addEventListener('click', openCityModal);
            
            const closeModal = document.getElementById('close-modal-btn');
            if (closeModal) closeModal.addEventListener('click', closeCityModal);
            
            const confirmCityBtn = document.getElementById('confirm-city-btn');
            if (confirmCityBtn) confirmCityBtn.addEventListener('click', confirmCity);
            
            const modalOverlay = document.getElementById('city-modal-overlay');
            if (modalOverlay) {
                modalOverlay.addEventListener('click', (e) => {
                    if (e.target === modalOverlay) closeCityModal();
                });
            }
            
            const adminBtns = ['contact-admin-main', 'contact-admin-from-product', 'contact-admin-after-order'];
            adminBtns.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.addEventListener('click', contactAdmin);
            });
            
            const backBtns = ['back-to-catalog', 'back-to-catalog-from-detail', 'continue-shopping-after-order'];
            backBtns.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.addEventListener('click', goToMainScreen);
            });
            
            // Кнопка "Купить" теперь показывает платежную карточку
            const orderBtn = document.getElementById('order-btn');
            if (orderBtn) orderBtn.addEventListener('click', showPaymentCard);
            
            // Кнопка "Оплатить заказ" отправляет данные в бота
            const payNowBtn = document.getElementById('pay-now-btn');
            if (payNowBtn) payNowBtn.addEventListener('click', sendOrderToBot);
            
            const applyPromoBtn = document.getElementById('apply-promo-btn');
            if (applyPromoBtn) applyPromoBtn.addEventListener('click', applyPromoCode);
            
            console.log('✅ Mini App инициализирован');
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
