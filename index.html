<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ Магазин Mini App</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --tg-color-scheme: light;
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #999999;
            --tg-theme-link-color: #2481cc;
            --tg-theme-button-color: #40a7e3;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #f0f0f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --tg-theme-bg-color: #1f1f1f;
                --tg-theme-text-color: #ffffff;
                --tg-theme-hint-color: #aaaaaa;
                --tg-theme-link-color: #5f9cea;
                --tg-theme-button-color: #5f9cea;
                --tg-theme-button-text-color: #ffffff;
                --tg-theme-secondary-bg-color: #2c2c2c;
            }
        }

        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 12px;
            max-width: 500px;
            margin: 0 auto;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Шапка с городом */
        .city-header {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .city-title {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .city-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--tg-theme-button-color);
        }

        /* Поиск (опционально) */
        .search-box {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 30px;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 16px;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--tg-theme-hint-color);
        }

        /* Категории (опционально) */
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 16px 0;
            margin-bottom: 8px;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            padding: 8px 16px;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 30px;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 500;
            opacity: 0.7;
            transition: all 0.2s;
        }

        .category-chip.active {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            opacity: 1;
        }

        /* Сетка товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .product-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: var(--tg-theme-bg-color);
        }

        .product-info {
            padding: 12px;
        }

        .product-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .product-price {
            color: var(--tg-theme-button-color);
            font-weight: 700;
            font-size: 18px;
        }

        .product-price small {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.7;
        }

        /* Детальная карточка товара */
        .product-detail {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .detail-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .detail-content {
            padding: 20px;
        }

        .detail-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .detail-price {
            font-size: 32px;
            font-weight: 800;
            color: var(--tg-theme-button-color);
            margin-bottom: 24px;
        }

        .detail-price small {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.7;
        }

        /* Селектор количества */
        .quantity-selector {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .quantity-label {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        .quantity-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .qty-btn {
            flex: 1;
            min-width: 60px;
            padding: 14px 8px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            border: 2px solid transparent;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .qty-btn.selected {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border-color: var(--tg-theme-button-color);
        }

        .total-price {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin: 16px 0;
            padding: 16px;
            background: var(--tg-theme-bg-color);
            border-radius: 16px;
        }

        /* Кнопки */
        .button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }

        .button:active {
            opacity: 0.7;
        }

        .button-primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .button-secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        /* Экран подтверждения */
        .confirmation-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: scaleIn 0.5s;
        }

        .order-details {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            padding: 24px;
            margin: 24px 0;
            text-align: left;
        }

        .order-detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        }

        .order-detail-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-label {
            opacity: 0.7;
        }

        .detail-value {
            font-weight: 600;
        }

        .total-amount {
            font-size: 28px;
            font-weight: 800;
            color: var(--tg-theme-button-color);
            margin: 20px 0;
        }

        /* Анимации */
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .hidden {
            display: none;
        }

        /* Навигация */
        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .back-button {
            background: none;
            border: none;
            color: var(--tg-theme-button-color);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            margin-right: 8px;
        }

        .nav-title {
            font-size: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Главный экран с товарами -->
    <div id="main-screen">
        <div class="city-header">
            <div class="city-title">🏙️ Ваш город</div>
            <div class="city-name" id="city-display">Москва</div>
        </div>
        <div class="products-grid" id="products-grid">
            <!-- Товары будут загружены через JavaScript -->
        </div>
    </div>

    <!-- Экран товара -->
    <div id="product-screen" class="hidden">
        <div class="nav-bar">
            <button class="back-button" id="back-to-catalog">←</button>
            <span class="nav-title" id="product-nav-title">Товар</span>
        </div>
        
        <div class="product-detail">
            <img class="detail-image" id="detail-image" src="" alt="product">
            <div class="detail-content">
                <div class="detail-title" id="detail-title">Название</div>
                <div class="detail-price" id="detail-price">0 ₽</div>
            </div>
        </div>

        <div class="quantity-selector">
            <div class="quantity-label">📦 Количество</div>
            <div class="quantity-buttons" id="quantity-buttons">
                <!-- Кнопки количества будут сгенерированы -->
            </div>
            <div class="total-price" id="total-price">0 ₽</div>
        </div>

        <button class="button button-primary" id="order-btn">✅ Оформить заказ</button>
        <button class="button button-secondary" id="back-to-catalog-from-detail">⬅️ Продолжить покупки</button>
    </div>

    <!-- Экран подтверждения -->
    <div id="confirmation-screen" class="hidden">
        <div class="confirmation-screen">
            <div class="success-icon">🎉</div>
            <h2>Заказ оформлен!</h2>
            
            <div class="order-details" id="order-details">
                <!-- Детали заказа будут вставлены через JS -->
            </div>

            <div class="total-amount" id="confirmation-total">0 ₽</div>
            
            <button class="button button-primary" id="continue-shopping">🛍️ Продолжить покупки</button>
            <button class="button button-secondary" id="close-app">🔚 Закрыть</button>
        </div>
    </div>

    <script>
    // Инициализация Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Получаем данные инициализации
    const initData = tg.initDataUnsafe || {};
    console.log('Init data:', initData);

    // Данные товаров с картинками
    const PRODUCTS = [
        { 
            id: 1, 
            name: "Шишки 🌰", 
            price: 3000, 
            category: "audio",
            image: "images/Shishka.png"
        },
        { 
            id: 2, 
            name: "Гашиш 🪴", 
            price: 3600, 
            category: "accessories",
            image: "images/Gash.png"
        },
        { 
            id: 3, 
            name: "Амфетамин  💊", 
            price: 2200, 
            category: "accessories",
            image: "images/amf.png"
        },
        { 
            id: 4, 
            name: "Экстази 🍃", 
            price: 1200, 
            category: "electronics",
            image: "images/Eks.png"
        },
        { 
            id: 5, 
            name: "Меф 🧂", 
            price: 1700, 
            category: "electronics",
            image: "images/Mef.png"
        },
        { 
            id: 6, 
            name: "А - кристалл 💎", 
            price: 5500, 
            category: "accessories",
            image: "images/Cry.png"
        },
        { 
            id: 7, 
            name: "Психотропные грибы 🍄", 
            price: 500, 
            category: "electronics",
            image: "images/Mush.png"
        },
        { 
            id: 8, 
            name: "Лирика 💧", 
            price: 8000, 
            category: "audio",
            image: "images/Lyr.png"
        },
    ];

    // Состояние приложения
    let state = {
        city: 'не выбран',
        selectedProduct: null,
        selectedQuantity: 1,
        currentCategory: 'all',
        searchQuery: '',
        user: initData.user || null
    };

    // Получаем город из разных источников
    function getCityFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('city');
    }

    function getCityFromStartParam() {
        return initData.start_param || null;
    }

    // Инициализация города
    function initializeCity() {
        // Пробуем получить город из URL (бот передает через кнопку)
        const urlCity = getCityFromUrl();
        // Пробуем получить из start_param (если бот передал через ссылку)
        const startCity = getCityFromStartParam();
        
        // Выбираем первый доступный город
        const city = urlCity || startCity || 'Москва';
        
        state.city = decodeURIComponent(city);
        document.getElementById('city-display').textContent = state.city;
        
        console.log('Город установлен:', state.city);
        return state.city;
    }

    // Запускаем инициализацию города
    const currentCity = initializeCity();

    // ===== ВСЕ ФУНКЦИИ ОСТАЮТСЯ ТАКИМИ ЖЕ =====
    // (loadProducts, selectProduct, selectQuantity, 
    // updateTotalPrice, placeOrder и т.д. - без изменений)

    function loadProducts() {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = PRODUCTS.map(product => `
            <div class="product-card" onclick="selectProduct(${product.id})">
                <img class="product-image" src="${product.image}" alt="${product.name}" 
                     onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                <div class="product-info">
                    <div class="product-title">${product.name}</div>
                    <div class="product-price">${product.price.toLocaleString()} ₽</div>
                </div>
            </div>
        `).join('');
    }

    window.selectProduct = function(productId) {
        state.selectedProduct = PRODUCTS.find(p => p.id === productId);
        state.selectedQuantity = 1;
        
        document.getElementById('detail-image').src = state.selectedProduct.image;
        document.getElementById('detail-title').textContent = state.selectedProduct.name;
        document.getElementById('detail-price').textContent = state.selectedProduct.price.toLocaleString() + ' ₽';
        
        const qtyContainer = document.getElementById('quantity-buttons');
        qtyContainer.innerHTML = '';
        for (let qty = 1; qty <= 5; qty++) {
            const btn = document.createElement('button');
            btn.className = `qty-btn ${qty === 1 ? 'selected' : ''}`;
            btn.textContent = `${qty} гр`;
            btn.onclick = () => selectQuantity(qty);
            qtyContainer.appendChild(btn);
        }
        
        updateTotalPrice();
        
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('product-screen').classList.remove('hidden');
    };

    function selectQuantity(qty) {
        state.selectedQuantity = qty;
        
        document.querySelectorAll('.qty-btn').forEach((btn, index) => {
            if (index + 1 === qty) {
                btn.classList.add('selected');
            } else {
                btn.classList.remove('selected');
            }
        });
        
        updateTotalPrice();
    }

    function updateTotalPrice() {
        if (state.selectedProduct) {
            const total = state.selectedProduct.price * state.selectedQuantity;
            document.getElementById('total-price').textContent = `${total.toLocaleString()} ₽`;
        }
    }

    // ИСПРАВЛЕННАЯ ФУНКЦИЯ ОФОРМЛЕНИЯ ЗАКАЗА (с городом!)
    function placeOrder() {
        if (!state.selectedProduct) return;
        
        const total = state.selectedProduct.price * state.selectedQuantity;
        
        // Подготавливаем данные заказа, ОБЯЗАТЕЛЬНО включаем город
        const orderData = {
            action: 'order',
            productId: state.selectedProduct.id,
            productName: state.selectedProduct.name,
            quantity: state.selectedQuantity,
            totalPrice: total,
            city: state.city,  // ВАЖНО: передаем город!
            userId: state.user?.id || null,
            username: state.user?.username || null
        };
        
        console.log('Отправка заказа:', orderData);
        
        // Отправляем данные в бота
        tg.sendData(JSON.stringify(orderData));
        
        // Показываем экран подтверждения
        document.getElementById('product-screen').classList.add('hidden');
        document.getElementById('confirmation-screen').classList.remove('hidden');
        
        // Детали заказа с городом
        const orderDetails = document.getElementById('order-details');
        orderDetails.innerHTML = `
            <div class="order-detail-item">
                <span class="detail-label">🏙️ Город:</span>
                <span class="detail-value">${state.city}</span>
            </div>
            <div class="order-detail-item">
                <span class="detail-label">📦 Товар:</span>
                <span class="detail-value">${state.selectedProduct.name}</span>
            </div>
            <div class="order-detail-item">
                <span class="detail-label">📊 Количество:</span>
                <span class="detail-value">${state.selectedQuantity} Гр.</span>
            </div>
            <div class="order-detail-item">
                <span class="detail-label">💰 Цена за гр:</span>
                <span class="detail-value">${state.selectedProduct.price.toLocaleString()} ₽</span>
            </div>
        `;
        
        document.getElementById('confirmation-total').textContent = `${total.toLocaleString()} ₽`;
    }

    // Навигация
    document.getElementById('back-to-catalog').addEventListener('click', () => {
        document.getElementById('product-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
    });

    document.getElementById('back-to-catalog-from-detail').addEventListener('click', () => {
        document.getElementById('product-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
    });

    document.getElementById('order-btn').addEventListener('click', placeOrder);

    document.getElementById('continue-shopping').addEventListener('click', () => {
        document.getElementById('confirmation-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
    });

    document.getElementById('close-app').addEventListener('click', () => {
        tg.close();
    });

    // Инициализация
    loadProducts();
</script>
</body>
</html>
