<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ Магазин Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --tg-color-scheme: light;
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #999999;
            --tg-theme-link-color: #2481cc;
            --tg-theme-button-color: #40a7e3;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #f0f0f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --tg-theme-bg-color: #1f1f1f;
                --tg-theme-text-color: #ffffff;
                --tg-theme-hint-color: #aaaaaa;
                --tg-theme-link-color: #5f9cea;
                --tg-theme-button-color: #5f9cea;
                --tg-theme-button-text-color: #ffffff;
                --tg-theme-secondary-bg-color: #2c2c2c;
            }
        }

        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 12px;
            max-width: 500px;
            margin: 0 auto;
            transition: background-color 0.3s, color 0.3s;
        }

        .city-header {
            background: var(--tg-theme-button-color);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(64, 167, 227, 0.3);
            text-align: center;
        }

        .city-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 4px;
            color: white;
        }

        .city-name {
            font-size: 28px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .debug-info {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            font-family: monospace;
            display: none; /* Скрыто по умолчанию, включите для отладки */
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .product-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: var(--tg-theme-bg-color);
        }

        .product-info {
            padding: 12px;
        }

        .product-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .product-price {
            color: var(--tg-theme-button-color);
            font-weight: 700;
            font-size: 16px;
        }

        .product-detail {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .detail-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .detail-content {
            padding: 20px;
        }

        .detail-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .detail-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--tg-theme-button-color);
            margin-bottom: 24px;
        }

        .quantity-selector {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .quantity-label {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        .quantity-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .qty-btn {
            flex: 1;
            min-width: 60px;
            padding: 14px 8px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            border: 2px solid transparent;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .qty-btn.selected {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border-color: var(--tg-theme-button-color);
        }

        .total-price {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin: 16px 0;
            padding: 16px;
            background: var(--tg-theme-bg-color);
            border-radius: 16px;
        }

        .button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }

        .button-primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .button-secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        .confirmation-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: scaleIn 0.5s;
        }

        .order-details {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            padding: 24px;
            margin: 24px 0;
            text-align: left;
        }

        .order-detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        }

        .order-detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            opacity: 0.7;
        }

        .detail-value {
            font-weight: 600;
        }

        .total-amount {
            font-size: 28px;
            font-weight: 800;
            color: var(--tg-theme-button-color);
            margin: 20px 0;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .hidden {
            display: none;
        }

        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .back-button {
            background: none;
            border: none;
            color: var(--tg-theme-button-color);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <!-- Главный экран -->
    <div id="main-screen">
        <div class="city-header" id="city-header">
            <div class="city-title">🏙️ ВАШ ГОРОД</div>
            <div class="city-name" id="city-display">ЗАГРУЗКА...</div>
        </div>

        <div class="debug-info" id="debug-info"></div>

        <div class="products-grid" id="products-grid">
            <!-- Товары загружаются через JS -->
        </div>
    </div>

    <!-- Экран товара -->
    <div id="product-screen" class="hidden">
        <div class="nav-bar">
            <button class="back-button" id="back-to-catalog">←</button>
            <span class="nav-title" id="product-nav-title">Товар</span>
        </div>
        
        <div class="product-detail">
            <img class="detail-image" id="detail-image" src="" alt="product">
            <div class="detail-content">
                <div class="detail-title" id="detail-title">Название</div>
                <div class="detail-price" id="detail-price">0 ₽</div>
            </div>
        </div>

        <div class="quantity-selector">
            <div class="quantity-label">📦 Количество</div>
            <div class="quantity-buttons" id="quantity-buttons"></div>
            <div class="total-price" id="total-price">0 ₽</div>
        </div>

        <button class="button button-primary" id="order-btn">✅ Оформить заказ</button>
        <button class="button button-secondary" id="back-to-catalog-from-detail">⬅️ Продолжить покупки</button>
    </div>

    <!-- Экран подтверждения -->
    <div id="confirmation-screen" class="hidden">
        <div class="confirmation-screen">
            <div class="success-icon">🎉</div>
            <h2>Заказ оформлен!</h2>
            
            <div class="order-details" id="order-details"></div>
            <div class="total-amount" id="confirmation-total">0 ₽</div>
            
            <button class="button button-primary" id="continue-shopping">🛍️ Продолжить покупки</button>
            <button class="button button-secondary" id="close-app">🔚 Закрыть</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Данные товаров
        const PRODUCTS = [
            { id: 1, name: "Наушники Sony WH-1000XM4", price: 15000, image: "https://m.media-amazon.com/images/I/61g6Yx1rQLL._AC_SL1500_.jpg" },
            { id: 2, name: "Клавиатура Mechanical", price: 8000, image: "https://m.media-amazon.com/images/I/61G0JNIBGQL._AC_SL1500_.jpg" },
            { id: 3, name: "Игровая мышь Logitech", price: 5000, image: "https://m.media-amazon.com/images/I/61rL2pVg5QL._AC_SL1500_.jpg" },
            { id: 4, name: "Монитор 24\" IPS", price: 22000, image: "https://m.media-amazon.com/images/I/71fFZvBqj3L._AC_SL1500_.jpg" },
            { id: 5, name: "Внешний SSD 1TB", price: 12000, image: "https://m.media-amazon.com/images/I/71Yg2H-i6gL._AC_SL1500_.jpg" },
            { id: 6, name: "Коврик для мыши", price: 1500, image: "https://m.media-amazon.com/images/I/61bM8b6J5bL._AC_SL1200_.jpg" },
            { id: 7, name: "Веб-камера HD", price: 6500, image: "https://m.media-amazon.com/images/I/61y2Uj4oVwL._AC_SL1500_.jpg" },
            { id: 8, name: "Микрофон USB", price: 9000, image: "https://m.media-amazon.com/images/I/61Tqj0r6JZL._AC_SL1500_.jpg" },
            { id: 9, name: "Акустическая система", price: 18000, image: "https://m.media-amazon.com/images/I/71tF7UOQQPL._AC_SL1500_.jpg" },
            { id: 10, name: "Ноутбук Dell XPS", price: 75000, image: "https://m.media-amazon.com/images/I/71wF7Y6nDkL._AC_SL1500_.jpg" }
        ];

        // Состояние приложения
        let state = {
            city: 'Москва', // По умолчанию
            selectedProduct: null,
            selectedQuantity: 1
        };

        // Функция для отладки
        function debug(message) {
            console.log('🔍', message);
            const debugEl = document.getElementById('debug-info');
            if (debugEl) {
                debugEl.innerHTML += message + '<br>';
                debugEl.style.display = 'block';
            }
        }

        debug('Mini App запущен');

        // ПОЛУЧАЕМ ГОРОД ИЗ URL
        function getCityFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const city = urlParams.get('city');
            debug(`Город из URL: ${city}`);
            return city;
        }

        // ПОЛУЧАЕМ ГОРОД ИЗ START PARAM (если есть)
        function getCityFromStartParam() {
            if (tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
                debug(`Start param: ${tg.initDataUnsafe.start_param}`);
                return tg.initDataUnsafe.start_param;
            }
            return null;
        }

        // ОСНОВНАЯ ФУНКЦИЯ ПОЛУЧЕНИЯ ГОРОДА
        function getCity() {
            // Сначала проверяем URL (приоритет 1)
            const urlCity = getCityFromUrl();
            if (urlCity) {
                try {
                    const decodedCity = decodeURIComponent(urlCity);
                    debug(`✅ Город из URL: ${decodedCity}`);
                    return decodedCity;
                } catch (e) {
                    debug(`❌ Ошибка декодирования URL: ${e}`);
                }
            }

            // Потом проверяем start_param (приоритет 2)
            const startCity = getCityFromStartParam();
            if (startCity) {
                debug(`✅ Город из start_param: ${startCity}`);
                return startCity;
            }

            // Если ничего не нашли - Москва по умолчанию
            debug(`⚠️ Город не найден, используем Москва`);
            return 'Москва';
        }

        // УСТАНАВЛИВАЕМ ГОРОД
        const city = getCity();
        state.city = city;
        
        debug(`🏙️ ИТОГОВЫЙ ГОРОД: ${state.city}`);
        
        // ОБНОВЛЯЕМ ОТОБРАЖЕНИЕ
        const cityDisplay = document.getElementById('city-display');
        if (cityDisplay) {
            cityDisplay.textContent = state.city;
        }

        // Меняем цвет хедера в зависимости от города (просто для красоты)
        const cityHeader = document.getElementById('city-header');
        if (cityHeader) {
            // Генерируем цвет на основе названия города
            const hue = (state.city.length * 10) % 360;
            cityHeader.style.background = `linear-gradient(135deg, var(--tg-theme-button-color), hsl(${hue}, 70%, 50%))`;
        }

        // Загрузка товаров
        function loadProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = PRODUCTS.map(product => `
                <div class="product-card" onclick="selectProduct(${product.id})">
                    <img class="product-image" src="${product.image}" alt="${product.name}" 
                         onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${product.price.toLocaleString()} ₽</div>
                    </div>
                </div>
            `).join('');
        }

        // Выбор товара
        window.selectProduct = function(productId) {
            state.selectedProduct = PRODUCTS.find(p => p.id === productId);
            state.selectedQuantity = 1;
            
            document.getElementById('detail-image').src = state.selectedProduct.image;
            document.getElementById('detail-title').textContent = state.selectedProduct.name;
            document.getElementById('detail-price').textContent = state.selectedProduct.price.toLocaleString() + ' ₽';
            
            const qtyContainer = document.getElementById('quantity-buttons');
            qtyContainer.innerHTML = '';
            for (let qty = 1; qty <= 5; qty++) {
                const btn = document.createElement('button');
                btn.className = `qty-btn ${qty === 1 ? 'selected' : ''}`;
                btn.textContent = `${qty} шт`;
                btn.onclick = () => selectQuantity(qty);
                qtyContainer.appendChild(btn);
            }
            
            updateTotalPrice();
            
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('product-screen').classList.remove('hidden');
        };

        function selectQuantity(qty) {
            state.selectedQuantity = qty;
            
            document.querySelectorAll('.qty-btn').forEach((btn, index) => {
                if (index + 1 === qty) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
            
            updateTotalPrice();
        }

        function updateTotalPrice() {
            if (state.selectedProduct) {
                const total = state.selectedProduct.price * state.selectedQuantity;
                document.getElementById('total-price').textContent = `${total.toLocaleString()} ₽`;
            }
        }

        // ОФОРМЛЕНИЕ ЗАКАЗА (с городом)
        function placeOrder() {
            if (!state.selectedProduct) return;
            
            const total = state.selectedProduct.price * state.selectedQuantity;
            
            // ФОРМИРУЕМ ДАННЫЕ ЗАКАЗА С ГОРОДОМ
            const orderData = {
                action: 'order',
                productId: state.selectedProduct.id,
                productName: state.selectedProduct.name,
                quantity: state.selectedQuantity,
                totalPrice: total,
                city: state.city  // ВАЖНО: передаем город!
            };
            
            debug(`📦 Отправка заказа: ${JSON.stringify(orderData)}`);
            
            // Отправляем в бота
            tg.sendData(JSON.stringify(orderData));
            
            // Показываем подтверждение
            document.getElementById('product-screen').classList.add('hidden');
            document.getElementById('confirmation-screen').classList.remove('hidden');
            
            // Детали заказа
            document.getElementById('order-details').innerHTML = `
                <div class="order-detail-item">
                    <span class="detail-label">🏙️ ГОРОД:</span>
                    <span class="detail-value" style="color: var(--tg-theme-button-color); font-weight: 800;">${state.city}</span>
                </div>
                <div class="order-detail-item">
                    <span class="detail-label">📦 Товар:</span>
                    <span class="detail-value">${state.selectedProduct.name}</span>
                </div>
                <div class="order-detail-item">
                    <span class="detail-label">📊 Количество:</span>
                    <span class="detail-value">${state.selectedQuantity} шт.</span>
                </div>
                <div class="order-detail-item">
                    <span class="detail-label">💰 Сумма:</span>
                    <span class="detail-value">${total.toLocaleString()} ₽</span>
                </div>
            `;
            
            document.getElementById('confirmation-total').textContent = `${total.toLocaleString()} ₽`;
        }

        // Навигация
        document.getElementById('back-to-catalog').addEventListener('click', () => {
            document.getElementById('product-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        });

        document.getElementById('back-to-catalog-from-detail').addEventListener('click', () => {
            document.getElementById('product-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        });

        document.getElementById('order-btn').addEventListener('click', placeOrder);

        document.getElementById('continue-shopping').addEventListener('click', () => {
            document.getElementById('confirmation-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        });

        document.getElementById('close-app').addEventListener('click', () => {
            tg.close();
        });

        // Инициализация
        loadProducts();
        debug(`🚀 Mini App готов. Город: ${state.city}`);
    </script>
</body>
</html>
