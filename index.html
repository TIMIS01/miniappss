<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHOP • мини магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Все стили остаются такими же */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --tg-color-scheme: light;
            --tg-theme-bg-color: #f8f9fa;
            --tg-theme-text-color: #1a1a1a;
            --tg-theme-hint-color: #6c757d;
            --tg-theme-link-color: #4361ee;
            --tg-theme-button-color: #4361ee;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #ffffff;
            
            --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
            --hover-transform: translateY(-4px);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --border-radius-lg: 28px;
            --border-radius-md: 20px;
            --border-radius-sm: 16px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --tg-theme-bg-color: #0f0f0f;
                --tg-theme-text-color: #ffffff;
                --tg-theme-hint-color: #a0a0a0;
                --tg-theme-link-color: #6c8cff;
                --tg-theme-button-color: #6c8cff;
                --tg-theme-button-text-color: #ffffff;
                --tg-theme-secondary-bg-color: #1e1e1e;
                
                --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
            }
        }

        body {
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            min-height: 100vh;
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: linear-gradient(135deg, var(--tg-theme-button-color) 0%, rgba(67, 97, 238, 0.1) 100%);
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        /* Шапка с городом */
        .city-header {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: var(--border-radius-lg);
            padding: 18px 22px;
            margin-bottom: 24px;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(128, 128, 128, 0.1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .city-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--tg-theme-button-color) 0%, transparent 100%);
            opacity: 0.05;
            z-index: 0;
        }

        .city-header:active {
            transform: scale(0.98);
        }

        .city-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--tg-theme-hint-color);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
            z-index: 1;
        }

        .city-title span:first-child {
            background: var(--tg-theme-button-color);
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
        }

        .city-name {
            font-size: 32px;
            font-weight: 800;
            color: var(--tg-theme-text-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .change-city-icon {
            font-size: 18px;
            opacity: 0.7;
            background: var(--tg-theme-bg-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .city-header:hover .change-city-icon {
            opacity: 1;
            transform: rotate(180deg);
        }

        /* Модальное окно выбора города */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .city-modal {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: var(--border-radius-lg);
            padding: 28px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.show .city-modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--tg-theme-button-color), #6c8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--tg-theme-hint-color);
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            line-height: 1;
            transition: var(--transition);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-modal:hover {
            background: rgba(128, 128, 128, 0.1);
            color: var(--tg-theme-text-color);
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .city-item {
            padding: 16px 8px;
            background: var(--tg-theme-bg-color);
            border-radius: var(--border-radius-sm);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            font-size: 15px;
            border: 2px solid transparent;
        }

        .city-item:hover {
            transform: translateY(-2px);
        }

        .city-item.selected {
            background: var(--tg-theme-button-color);
            color: white;
            border-color: var(--tg-theme-button-color);
            transform: scale(1.02);
        }

        .city-item:active {
            transform: scale(0.95);
        }

        /* Кнопка администратора */
        .admin-button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 24px;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid rgba(128, 128, 128, 0.1);
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .admin-button:active {
            transform: scale(0.98);
        }

        .admin-button span {
            font-size: 20px;
        }

        /* Сетка товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .product-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(128, 128, 128, 0.1);
            box-shadow: var(--card-shadow);
            position: relative;
        }

        .product-card:hover {
            transform: var(--hover-transform);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.2);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: var(--transition);
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            padding: 16px;
            position: relative;
        }

        .product-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .product-price {
            color: var(--tg-theme-button-color);
            font-weight: 800;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .product-price::before {
            content: '₽';
            font-size: 14px;
            opacity: 0.7;
        }

        /* Детальная страница товара */
        .product-detail {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        .detail-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .detail-content {
            padding: 24px;
        }

        .detail-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .detail-price {
            font-size: 36px;
            font-weight: 900;
            color: var(--tg-theme-button-color);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-price::before {
            content: '₽';
            font-size: 24px;
            opacity: 0.7;
        }

        /* Навигация */
        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            background: var(--tg-theme-secondary-bg-color);
            padding: 8px 12px;
            border-radius: 50px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(128, 128, 128, 0.1);
            backdrop-filter: blur(10px);
        }

        .back-button {
            background: none;
            border: none;
            color: var(--tg-theme-button-color);
            font-size: 24px;
            cursor: pointer;
            padding: 8px 12px;
            margin-right: 8px;
            border-radius: 30px;
            transition: var(--transition);
        }

        .back-button:active {
            background: rgba(67, 97, 238, 0.1);
        }

        .nav-title {
            font-weight: 700;
            font-size: 18px;
            flex: 1;
        }

        /* Выбор количества */
        .quantity-selector {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        .quantity-label {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quantity-label span {
            background: var(--tg-theme-button-color);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }

        .quantity-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .qty-btn {
            flex: 1;
            min-width: 70px;
            padding: 16px 8px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            border: 2px solid transparent;
            border-radius: var(--border-radius-sm);
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .qty-btn.selected {
            background: var(--tg-theme-button-color);
            color: white;
            border-color: var(--tg-theme-button-color);
            transform: scale(1.05);
            box-shadow: 0 10px 20px -5px var(--tg-theme-button-color);
        }

        /* Промокод секция */
        .promo-section {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        .promo-input-container {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .promo-input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid rgba(128, 128, 128, 0.1);
            border-radius: var(--border-radius-sm);
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: var(--transition);
            letter-spacing: 1px;
        }

        .promo-input:focus {
            border-color: var(--tg-theme-button-color);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
        }

        .promo-apply-btn {
            padding: 16px 28px;
            background: var(--tg-theme-button-color);
            color: white;
            border: none;
            border-radius: var(--border-radius-sm);
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .promo-apply-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        .promo-apply-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .promo-status {
            padding: 16px;
            border-radius: var(--border-radius-sm);
            font-size: 15px;
            font-weight: 500;
            margin-top: 12px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .promo-status.success {
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
            border: 1px solid #4CAF50;
            display: block;
        }

        .promo-status.error {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border: 1px solid #f44336;
            display: block;
        }

        .promo-status.info {
            background: rgba(33, 150, 243, 0.1);
            color: #2196F3;
            border: 1px solid #2196F3;
            display: block;
        }

        /* Общая сумма */
        .total-price {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            margin: 16px 0 24px;
            padding: 20px;
            background: linear-gradient(135deg, var(--tg-theme-button-color), #6c8cff);
            border-radius: var(--border-radius-md);
            color: white;
            box-shadow: 0 15px 30px -10px var(--tg-theme-button-color);
        }

        .price-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .price-without-discount {
            text-decoration: line-through;
            opacity: 0.7;
            font-size: 24px;
            font-weight: 600;
        }

        .discount-badge {
            background: rgba(255, 255, 255, 0.25);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Кнопки */
        .button {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: var(--border-radius-md);
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .button:active::before {
            width: 300px;
            height: 300px;
        }

        .button-primary {
            background: var(--tg-theme-button-color);
            color: white;
            box-shadow: 0 10px 20px -5px var(--tg-theme-button-color);
        }

        .button-secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid rgba(128, 128, 128, 0.1);
            box-shadow: var(--card-shadow);
        }

        /* Экран подтверждения */
        .confirmation-screen {
            text-align: center;
            padding: 20px 20px 30px;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h2 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 24px;
            background: linear-gradient(135deg, var(--tg-theme-button-color), #6c8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .order-details {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            margin: 24px 0;
            text-align: left;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        .order-detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        }

        .order-detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            opacity: 0.7;
            font-weight: 500;
        }

        .detail-value {
            font-weight: 700;
            font-size: 18px;
        }

        .total-amount {
            font-size: 36px;
            font-weight: 900;
            color: var(--tg-theme-button-color);
            margin: 24px 0;
        }

        #confirmation-discount {
            color: #4CAF50;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: var(--border-radius-sm);
        }

        .contact-section {
            margin-top: 30px;
            padding-top: 24px;
            border-top: 2px dashed rgba(128, 128, 128, 0.2);
        }

        .contact-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--tg-theme-button-color);
        }

        .contact-buttons {
            display: flex;
            gap: 12px;
        }

        .contact-button {
            flex: 1;
            padding: 16px;
            border-radius: var(--border-radius-sm);
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            font-size: 15px;
        }

        .contact-button:active {
            transform: scale(0.95);
        }

        .contact-button.primary {
            background: var(--tg-theme-button-color);
            color: white;
        }

        .contact-button.secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        .info-message {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: var(--border-radius-md);
            padding: 20px;
            margin: 24px 0 0;
            text-align: center;
            font-size: 15px;
            opacity: 0.9;
            border: 1px solid rgba(128, 128, 128, 0.1);
            box-shadow: var(--card-shadow);
        }

        .hidden {
            display: none;
        }

        .save-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CAF50;
            margin-left: 10px;
            animation: pulse 2s infinite;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.3);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Модальное окно выбора города -->
    <div class="modal-overlay" id="city-modal-overlay">
        <div class="city-modal">
            <div class="modal-header">
                <div class="modal-title">🏙️ Выберите город</div>
                <button class="close-modal" id="close-modal-btn">✕</button>
            </div>
            <div class="cities-grid" id="cities-grid"></div>
            <button class="button button-primary" id="confirm-city-btn">Подтвердить выбор</button>
        </div>
    </div>

    <!-- Главный экран -->
    <div id="main-screen">
        <div class="city-header" id="city-header">
            <div class="city-title">
                <span>📍 ТВОЙ ГОРОД</span>
                <span>▼</span>
            </div>
            <div class="city-name" id="city-display">
                <span id="city-name-text">ЗАГРУЗКА...</span>
                <span class="change-city-icon">✎</span>
            </div>
        </div>

        <!-- Кнопка связи с администратором -->
        <button class="admin-button" id="contact-admin-main">
            <span>📞</span> Связаться с администратором
        </button>

        <div class="products-grid" id="products-grid">
            <!-- Товары будут загружены сюда -->
        </div>
    </div>

    <!-- Экран товара -->
    <div id="product-screen" class="hidden">
        <div class="nav-bar">
            <button class="back-button" id="back-to-catalog">←</button>
            <span class="nav-title" id="product-nav-title">Товар</span>
        </div>
        
        <div class="product-detail">
            <img class="detail-image" id="detail-image" src="" alt="product">
            <div class="detail-content">
                <div class="detail-title" id="detail-title">Название</div>
                <div class="detail-price" id="detail-price">0</div>
            </div>
        </div>

        <div class="quantity-selector">
            <div class="quantity-label">
                📦 Количество
                <span>грамм</span>
            </div>
            <div class="quantity-buttons" id="quantity-buttons"></div>
        </div>

        <!-- Секция промокода -->
        <div class="promo-section">
            <div class="quantity-label">🏷️ Промокод</div>
            <div class="promo-input-container">
                <input type="text" class="promo-input" id="promo-code" placeholder="Введите промокод" maxlength="20" autocomplete="off">
                <button class="promo-apply-btn" id="apply-promo">Применить</button>
            </div>
            <div class="promo-status" id="promo-status"></div>
        </div>

        <div class="total-price" id="total-price">
            <div class="price-container">
                <span>0 ₽</span>
            </div>
        </div>

        <button class="button button-primary" id="order-btn">
            ✅ Оформить заказ
        </button>
        <button class="button button-secondary" id="contact-admin-from-product">
            📞 Связаться с администратором
        </button>
        <button class="button button-secondary" id="back-to-catalog-from-detail">
            ⬅️ Продолжить покупки
        </button>
    </div>

    <!-- Экран подтверждения заказа -->
    <div id="confirmation-screen" class="hidden">
        <div class="confirmation-screen">
            <div class="success-icon">🎉</div>
            <h2>Заказ оформлен!</h2>
            
            <div class="order-details" id="order-details"></div>
            <div class="total-amount" id="confirmation-total">0 ₽</div>
            <div id="confirmation-discount"></div>

            <div class="contact-section">
                <div class="contact-title">📞 Нужна помощь с заказом?</div>
                <div class="contact-buttons">
                    <div class="contact-button primary" id="contact-admin-after-order">
                        Написать админу
                    </div>
                    <div class="contact-button secondary" id="continue-shopping-after-order">
                        Продолжить
                    </div>
                </div>
            </div>

            <div class="info-message">
                💬 Вы также можете написать администратору в чат с ботом
            </div>
        </div>
    </div>

    <script>
    // Инициализация Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    // ВАЖНО: Отключаем подтверждение закрытия
    if (tg.disableClosingConfirmation) {
        tg.disableClosingConfirmation();
    }
    
    // Получаем информацию о пользователе разными способами
    const initData = tg.initDataUnsafe;
    const initDataStr = tg.initData;
    
    console.log('Init Data:', initData);
    console.log('Init Data String:', initDataStr);
    
    // Токен бота
    const BOT_TOKEN = '8650034473:AAHOoD4BmYUBTrJCG1o2y8fMjabNIZN3hm8';
    const API_URL = `https://api.telegram.org/bot${BOT_TOKEN}`;
    
    // Получаем ID пользователя разными способами
    let CHAT_ID = null;
    
    // Способ 1: из initDataUnsafe
    if (initData && initData.user && initData.user.id) {
        CHAT_ID = initData.user.id;
        console.log('CHAT_ID из initData.user:', CHAT_ID);
    }
    
    // Способ 2: парсим из initData строки
    if (!CHAT_ID && initDataStr) {
        try {
            const params = new URLSearchParams(initDataStr);
            const userStr = params.get('user');
            if (userStr) {
                const user = JSON.parse(decodeURIComponent(userStr));
                CHAT_ID = user.id;
                console.log('CHAT_ID из парсинга строки:', CHAT_ID);
            }
        } catch (e) {
            console.error('Ошибка парсинга initData:', e);
        }
    }
    
    // Способ 3: используем ID из start param (если есть)
    if (!CHAT_ID) {
        const urlParams = new URLSearchParams(window.location.search);
        const startParam = urlParams.get('start');
        if (startParam) {
            CHAT_ID = parseInt(startParam);
            console.log('CHAT_ID из start param:', CHAT_ID);
        }
    }
    
    console.log('Итоговый CHAT_ID:', CHAT_ID);

    // Если все еще нет CHAT_ID, показываем ошибку
    if (!CHAT_ID) {
        tg.showPopup({
            title: '❌ Ошибка авторизации',
            message: 'Не удалось определить пользователя. Пожалуйста, перезапустите бота командой /start',
            buttons: [{ type: 'ok' }]
        });
    }

    // ===== ФУНКЦИИ СВЯЗИ С АДМИНИСТРАТОРОМ =====
    async function contactAdmin() {
        if (!CHAT_ID) {
            tg.showPopup({
                title: '❌ Ошибка',
                message: 'Не удалось определить пользователя. Перезапустите бота командой /start',
                buttons: [{ type: 'ok' }]
            });
            return;
        }

        const data = {
            action: 'contact_admin',
            city: state.city
        };

        try {
            const response = await fetch(`${API_URL}/sendMessage`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: JSON.stringify(data)
                })
            });

            const result = await response.json();
            
            if (result.ok) {
                tg.showPopup({
                    title: '📞 Запрос отправлен',
                    message: 'Администратор свяжется с вами в ближайшее время.',
                    buttons: [{ type: 'ok' }]
                });
            } else {
                throw new Error('Ошибка отправки');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            tg.showPopup({
                title: '❌ Ошибка',
                message: 'Не удалось отправить запрос',
                buttons: [{ type: 'ok' }]
            });
        }
    }

    // ===== ФУНКЦИИ ДЛЯ ПРОМОКОДОВ =====
    async function applyPromoCode() {
        const promoInput = document.getElementById('promo-code');
        const code = promoInput.value.trim().toUpperCase();
        const statusDiv = document.getElementById('promo-status');
        const applyBtn = document.getElementById('apply-promo');

        if (!code) {
            showPromoStatus('Введите промокод', 'error');
            return;
        }

        if (!state.selectedProduct) {
            showPromoStatus('Сначала выберите товар', 'error');
            return;
        }

        if (!CHAT_ID) {
            showPromoStatus('Ошибка авторизации. Перезапустите бота', 'error');
            return;
        }

        if (state.isCheckingPromo) {
            return;
        }

        state.isCheckingPromo = true;
        applyBtn.disabled = true;
        showPromoStatus('Проверка промокода...', 'info');

        try {
            const requestId = Date.now() + '_' + Math.random().toString(36);
            
            const data = {
                action: 'check_promo',
                requestId: requestId,
                code: code,
                productId: state.selectedProduct.id
            };

            console.log('Отправка запроса на проверку промокода:', data);
            console.log('CHAT_ID:', CHAT_ID);

            // Создаем обработчик для получения ответа
            const responsePromise = new Promise((resolve, reject) => {
                // Таймаут на случай отсутствия ответа
                const timeout = setTimeout(() => {
                    window.removeEventListener('message', messageHandler);
                    reject(new Error('Таймаут'));
                }, 8000);

                // Обработчик сообщений от бота
                const messageHandler = (event) => {
                    console.log('Получено событие message:', event);
                    try {
                        // Пробуем получить данные из event
                        let eventData = event.data;
                        if (typeof eventData === 'string') {
                            try {
                                const parsed = JSON.parse(eventData);
                                if (parsed.action === 'promo_response' && parsed.requestId === requestId) {
                                    clearTimeout(timeout);
                                    window.removeEventListener('message', messageHandler);
                                    resolve(parsed);
                                }
                            } catch (e) {
                                // Не JSON сообщение, игнорируем
                            }
                        }
                    } catch (e) {
                        console.error('Ошибка обработки сообщения:', e);
                    }
                };

                window.addEventListener('message', messageHandler);
                
                // Также слушаем Telegram WebApp события
                if (tg.onEvent) {
                    tg.onEvent('message', function(telegramEvent) {
                        console.log('Telegram message event:', telegramEvent);
                        try {
                            if (telegramEvent && telegramEvent.data) {
                                const parsed = JSON.parse(telegramEvent.data);
                                if (parsed.action === 'promo_response' && parsed.requestId === requestId) {
                                    clearTimeout(timeout);
                                    tg.offEvent('message', this);
                                    resolve(parsed);
                                }
                            }
                        } catch (e) {
                            console.error('Ошибка обработки Telegram события:', e);
                        }
                    });
                }
            });

            // Отправляем запрос
            const response = await fetch(`${API_URL}/sendMessage`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: JSON.stringify(data)
                })
            });

            const result = await response.json();
            console.log('Ответ от API:', result);

            if (!result.ok) {
                throw new Error(`Ошибка API: ${result.description || 'Неизвестная ошибка'}`);
            }

            // Ждем ответ
            const promoResponse = await responsePromise;
            console.log('Ответ на промокод:', promoResponse);

            if (promoResponse.success) {
                state.appliedPromo = {
                    code: code,
                    discount: promoResponse.discount
                };
                
                showPromoStatus(`✅ Промокод применен! Скидка ${promoResponse.discount}%`, 'success');
                updateTotalPrice();
                
                localStorage.setItem('last_promo_' + state.selectedProduct.id, JSON.stringify({
                    code: code,
                    discount: promoResponse.discount
                }));
            } else {
                showPromoStatus(promoResponse.error || '❌ Неверный промокод', 'error');
                state.appliedPromo = null;
                updateTotalPrice();
            }
        } catch (error) {
            console.error('Ошибка проверки промокода:', error);
            showPromoStatus('❌ Ошибка проверки промокода: ' + error.message, 'error');
            state.appliedPromo = null;
        } finally {
            state.isCheckingPromo = false;
            applyBtn.disabled = false;
        }
    }

    // ===== ФУНКЦИИ ДЛЯ ЗАКАЗА =====
    async function placeOrder() {
        if (!state.selectedProduct) return;
        
        if (!CHAT_ID) {
            tg.showPopup({
                title: '❌ Ошибка',
                message: 'Не удалось определить пользователя. Перезапустите бота командой /start',
                buttons: [{ type: 'ok' }]
            });
            return;
        }
        
        const baseTotal = state.selectedProduct.price * state.selectedQuantity;
        const finalTotal = state.appliedPromo 
            ? baseTotal - Math.round(baseTotal * (state.appliedPromo.discount / 100))
            : baseTotal;
        
        const orderData = {
            action: 'order',
            productName: state.selectedProduct.name,
            quantity: state.selectedQuantity,
            basePrice: state.selectedProduct.price,
            baseTotal: baseTotal,
            finalTotal: finalTotal,
            city: state.city,
            promoCode: state.appliedPromo ? state.appliedPromo.code : null,
            discount: state.appliedPromo ? state.appliedPromo.discount : 0
        };
        
        console.log('📦 Отправка заказа:', orderData);
        console.log('CHAT_ID:', CHAT_ID);

        try {
            // Показываем экран подтверждения сразу
            document.getElementById('product-screen').classList.add('hidden');
            document.getElementById('confirmation-screen').classList.remove('hidden');
            
            // Заполняем детали заказа
            let discountHtml = '';
            if (state.appliedPromo) {
                discountHtml = `
                    <div class="order-detail-item">
                        <span class="detail-label">🏷️ Промокод:</span>
                        <span class="detail-value">${state.appliedPromo.code} (-${state.appliedPromo.discount}%)</span>
                    </div>
                    <div class="order-detail-item">
                        <span class="detail-label">💰 Экономия:</span>
                        <span class="detail-value">${(baseTotal - finalTotal).toLocaleString()} ₽</span>
                    </div>
                `;
            }
            
            document.getElementById('order-details').innerHTML = `
                <div class="order-detail-item">
                    <span class="detail-label">🏙️ Город:</span>
                    <span class="detail-value">${state.city}</span>
                </div>
                <div class="order-detail-item">
                    <span class="detail-label">📦 Товар:</span>
                    <span class="detail-value">${state.selectedProduct.name} ${state.selectedProduct.emoji}</span>
                </div>
                <div class="order-detail-item">
                    <span class="detail-label">📊 Количество:</span>
                    <span class="detail-value">${state.selectedQuantity} г</span>
                </div>
                <div class="order-detail-item">
                    <span class="detail-label">💰 Цена за г:</span>
                    <span class="detail-value">${state.selectedProduct.price.toLocaleString()} ₽</span>
                </div>
                ${discountHtml}
            `;
            
            document.getElementById('confirmation-total').textContent = `${finalTotal.toLocaleString()} ₽`;
            
            if (state.appliedPromo) {
                document.getElementById('confirmation-discount').innerHTML = `
                    🎉 Промокод ${state.appliedPromo.code} применен! Скидка ${state.appliedPromo.discount}%
                `;
            } else {
                document.getElementById('confirmation-discount').innerHTML = '';
            }
            
            // Отправляем данные
            const response = await fetch(`${API_URL}/sendMessage`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: JSON.stringify(orderData)
                })
            });

            const result = await response.json();
            console.log('Результат отправки заказа:', result);
            
            if (result.ok) {
                tg.showPopup({
                    title: '✅ Заказ отправлен',
                    message: 'Ваш заказ отправлен администратору. Ожидайте подтверждения.',
                    buttons: [{ type: 'ok' }]
                });
            } else {
                throw new Error(result.description || 'Ошибка отправки');
            }
        } catch (error) {
            console.error('Ошибка отправки заказа:', error);
            tg.showPopup({
                title: '❌ Ошибка',
                message: 'Не удалось отправить заказ: ' + error.message,
                buttons: [{ type: 'ok' }]
            });
        }
    }

    // ===== ФУНКЦИЯ ДЛЯ ОТОБРАЖЕНИЯ СТАТУСА ПРОМОКОДА =====
    function showPromoStatus(message, type) {
        const statusDiv = document.getElementById('promo-status');
        statusDiv.className = `promo-status ${type}`;
        statusDiv.textContent = message;
        statusDiv.style.display = 'block';
        
        if (type === 'success') {
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }
    }

    // ===== ОСТАЛЬНЫЕ ФУНКЦИИ (город, товары, и т.д.) ОСТАЮТСЯ БЕЗ ИЗМЕНЕНИЙ =====
    // ... (весь остальной код из предыдущей версии)
</script>
