<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ Магазин Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --tg-color-scheme: light;
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #999999;
            --tg-theme-link-color: #2481cc;
            --tg-theme-button-color: #40a7e3;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #f0f0f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --tg-theme-bg-color: #1f1f1f;
                --tg-theme-text-color: #ffffff;
                --tg-theme-hint-color: #aaaaaa;
                --tg-theme-link-color: #5f9cea;
                --tg-theme-button-color: #5f9cea;
                --tg-theme-button-text-color: #ffffff;
                --tg-theme-secondary-bg-color: #2c2c2c;
            }
        }

        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .city-header {
            background: linear-gradient(135deg, var(--tg-theme-button-color), #5f9cea);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(64, 167, 227, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .city-header:active {
            transform: scale(0.98);
        }

        .city-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 4px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .city-name {
            font-size: 28px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .change-city-icon {
            font-size: 18px;
            opacity: 0.8;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .city-modal {
            background: var(--tg-theme-bg-color);
            border-radius: 30px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.show .city-modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--tg-theme-text-color);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .city-item {
            padding: 14px 8px;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .city-item.selected {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .city-item:active {
            transform: scale(0.95);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .product-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: var(--tg-theme-bg-color);
        }

        .product-info {
            padding: 12px;
        }

        .product-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .product-price {
            color: var(--tg-theme-button-color);
            font-weight: 700;
            font-size: 16px;
        }

        .product-detail {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .detail-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .detail-content {
            padding: 20px;
        }

        .detail-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .detail-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--tg-theme-button-color);
            margin-bottom: 24px;
        }

        .quantity-selector {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .quantity-label {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        .quantity-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .qty-btn {
            flex: 1;
            min-width: 60px;
            padding: 14px 8px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            border: 2px solid transparent;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .qty-btn.selected {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border-color: var(--tg-theme-button-color);
        }

        .total-price {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin: 16px 0;
            padding: 16px;
            background: var(--tg-theme-bg-color);
            border-radius: 16px;
        }

        .button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }

        .button-primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .button-secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        .confirmation-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: scaleIn 0.5s;
        }

        .order-details {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            padding: 24px;
            margin: 24px 0;
            text-align: left;
        }

        .order-detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        }

        .order-detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            opacity: 0.7;
        }

        .detail-value {
            font-weight: 600;
        }

        .total-amount {
            font-size: 28px;
            font-weight: 800;
            color: var(--tg-theme-button-color);
            margin: 20px 0;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .hidden {
            display: none;
        }

        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .back-button {
            background: none;
            border: none;
            color: var(--tg-theme-button-color);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            margin-right: 8px;
        }

        .save-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Модальное окно выбора города -->
    <div class="modal-overlay" id="city-modal-overlay">
        <div class="city-modal">
            <div class="modal-header">
                <div class="modal-title">🏙️ Выберите город</div>
                <button class="close-modal" id="close-modal-btn">&times;</button>
            </div>
            <div class="cities-grid" id="cities-grid"></div>
            <button class="button button-primary" id="confirm-city-btn">Подтвердить</button>
        </div>
    </div>

    <!-- Главный экран -->
    <div id="main-screen">
        <div class="city-header" id="city-header">
            <div class="city-title">
                <span>🏙️ ВАШ ГОРОД</span>
                <span class="change-city-icon">▼</span>
            </div>
            <div class="city-name" id="city-display">
                <span id="city-name-text">ЗАГРУЗКА...</span>
                <span class="save-indicator" id="save-indicator" style="display: none;"></span>
            </div>
        </div>
        <div class="products-grid" id="products-grid"></div>
    </div>

    <!-- Экран товара -->
    <div id="product-screen" class="hidden">
        <div class="nav-bar">
            <button class="back-button" id="back-to-catalog">←</button>
            <span class="nav-title" id="product-nav-title">Товар</span>
        </div>
        
        <div class="product-detail">
            <img class="detail-image" id="detail-image" src="" alt="product">
            <div class="detail-content">
                <div class="detail-title" id="detail-title">Название</div>
                <div class="detail-price" id="detail-price">0 ₽</div>
            </div>
        </div>

        <div class="quantity-selector">
            <div class="quantity-label">📦 Количество</div>
            <div class="quantity-buttons" id="quantity-buttons"></div>
            <div class="total-price" id="total-price">0 ₽</div>
        </div>

        <button class="button button-primary" id="order-btn">✅ Оформить заказ</button>
        <button class="button button-secondary" id="back-to-catalog-from-detail">⬅️ Продолжить покупки</button>
    </div>

    <!-- Экран подтверждения -->
    <div id="confirmation-screen" class="hidden">
        <div class="confirmation-screen">
            <div class="success-icon">🎉</div>
            <h2>Заказ оформлен!</h2>
            <div class="order-details" id="order-details"></div>
            <div class="total-amount" id="confirmation-total">0 ₽</div>
            <button class="button button-primary" id="continue-shopping">🛍️ Продолжить покупки</button>
            <button class="button button-secondary" id="close-app">🔚 Закрыть</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Список городов
        const CITIES = [
            "Москва", "Санкт-Петербург", "Новосибирск", "Екатеринбург", "Казань",
            "Нижний Новгород", "Челябинск", "Самара", "Омск", "Ростов-на-Дону",
            "Уфа", "Красноярск", "Воронеж", "Пермь", "Волгоград"
        ];

        // Данные товаров
        const PRODUCTS = [
        { 
            id: 1, 
            name: "Шишки 🌰", 
            price: 3000, 
            category: "audio",
            image: "images/Shishka.png"
        },
        { 
            id: 2, 
            name: "Гашиш 🪴", 
            price: 3600, 
            category: "accessories",
            image: "images/Gash.png"
        },
        { 
            id: 3, 
            name: "Амфетамин  💊", 
            price: 2200, 
            category: "accessories",
            image: "images/amf.png"
        },
        { 
            id: 4, 
            name: "Экстази 🍃", 
            price: 1200, 
            category: "electronics",
            image: "images/Eks.png"
        },
        { 
            id: 5, 
            name: "Меф 🧂", 
            price: 1700, 
            category: "electronics",
            image: "images/Mef.png"
        },
        { 
            id: 6, 
            name: "А - кристалл 💎", 
            price: 5500, 
            category: "accessories",
            image: "images/Cry.png"
        },
        { 
            id: 7, 
            name: "Психотропные грибы 🍄", 
            price: 500, 
            category: "electronics",
            image: "images/Mush.png"
        },
        { 
            id: 8, 
            name: "Лирика 💧", 
            price: 8000, 
            category: "audio",
            image: "images/Lyr.png"
        },
    ];

        // Ключ для localStorage
        const STORAGE_KEY = 'shop_selected_city';

        // Состояние приложения
        let state = {
            city: 'Москва',
            selectedProduct: null,
            selectedQuantity: 1,
            tempSelectedCity: 'Москва'
        };

        // ===== ФУНКЦИИ РАБОТЫ С ГОРОДОМ =====

        // Получение города из URL (от бота)
        function getCityFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const city = urlParams.get('city');
            if (city) {
                try {
                    return decodeURIComponent(city);
                } catch (e) {
                    return city;
                }
            }
            return null;
        }

        // Загрузка города из localStorage
        function loadCityFromStorage() {
            try {
                const savedCity = localStorage.getItem(STORAGE_KEY);
                if (savedCity && CITIES.includes(savedCity)) {
                    console.log('📦 Загружен город из localStorage:', savedCity);
                    return savedCity;
                }
            } catch (e) {
                console.error('Ошибка загрузки из localStorage:', e);
            }
            return null;
        }

        // Сохранение города в localStorage
        function saveCityToStorage(city) {
            try {
                localStorage.setItem(STORAGE_KEY, city);
                console.log('💾 Сохранен город в localStorage:', city);
                
                // Показываем индикатор сохранения
                const indicator = document.getElementById('save-indicator');
                if (indicator) {
                    indicator.style.display = 'inline-block';
                    setTimeout(() => {
                        indicator.style.display = 'none';
                    }, 2000);
                }
            } catch (e) {
                console.error('Ошибка сохранения в localStorage:', e);
            }
        }

        // ИНИЦИАЛИЗАЦИЯ ГОРОДА (ВАЖНО: приоритет у localStorage!)
        function initializeCity() {
            // 1. Сначала пробуем загрузить из localStorage
            const savedCity = loadCityFromStorage();
            
            // 2. Если есть сохраненный город - используем его
            if (savedCity) {
                state.city = savedCity;
                state.tempSelectedCity = savedCity;
                console.log('🏙️ Используем город из localStorage:', savedCity);
            } else {
                // 3. Если нет сохраненного, пробуем из URL
                const urlCity = getCityFromUrl();
                if (urlCity && CITIES.includes(urlCity)) {
                    state.city = urlCity;
                    state.tempSelectedCity = urlCity;
                    // Сохраняем в localStorage для будущих разов
                    saveCityToStorage(urlCity);
                    console.log('🏙️ Используем город из URL:', urlCity);
                } else {
                    console.log('🏙️ Используем город по умолчанию: Москва');
                }
            }
            
            // Обновляем отображение
            updateCityDisplay();
        }

        // Обновление отображения города
        function updateCityDisplay() {
            const cityNameElement = document.getElementById('city-name-text');
            if (cityNameElement) {
                cityNameElement.textContent = state.city;
            }
        }

        // Загрузка городов в модальное окно
        function loadCitiesModal() {
            const grid = document.getElementById('cities-grid');
            grid.innerHTML = CITIES.map(city => `
                <div class="city-item ${city === state.city ? 'selected' : ''}" 
                     onclick="selectTempCity('${city}')">
                    ${city}
                </div>
            `).join('');
        }

        // Временный выбор города
        window.selectTempCity = function(city) {
            state.tempSelectedCity = city;
            
            document.querySelectorAll('.city-item').forEach(el => {
                if (el.textContent.trim() === city) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
        };

        // Подтверждение выбора города
        function confirmCity() {
            if (state.tempSelectedCity !== state.city) {
                // Меняем город
                state.city = state.tempSelectedCity;
                
                // СОХРАНЯЕМ В localStorage (важно!)
                saveCityToStorage(state.city);
                
                // Обновляем отображение
                updateCityDisplay();
                
                // Обновляем модальное окно
                loadCitiesModal();
                
                console.log('✅ Город изменен на:', state.city);
            }
            closeCityModal();
        }

        // Открыть модальное окно
        function openCityModal() {
            state.tempSelectedCity = state.city;
            loadCitiesModal();
            document.getElementById('city-modal-overlay').classList.add('show');
        }

        // Закрыть модальное окно
        function closeCityModal() {
            document.getElementById('city-modal-overlay').classList.remove('show');
        }

        // ===== ТОВАРЫ И ЗАКАЗЫ =====

        function loadProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = PRODUCTS.map(product => `
                <div class="product-card" onclick="selectProduct(${product.id})">
                    <img class="product-image" src="${product.image}" alt="${product.name}" 
                         onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${product.price.toLocaleString()} ₽</div>
                    </div>
                </div>
            `).join('');
        }

        window.selectProduct = function(productId) {
            state.selectedProduct = PRODUCTS.find(p => p.id === productId);
            state.selectedQuantity = 1;
            
            document.getElementById('detail-image').src = state.selectedProduct.image;
            document.getElementById('detail-title').textContent = state.selectedProduct.name;
            document.getElementById('detail-price').textContent = state.selectedProduct.price.toLocaleString() + ' ₽';
            document.getElementById('product-nav-title').textContent = state.selectedProduct.name;
            
            const qtyContainer = document.getElementById('quantity-buttons');
            qtyContainer.innerHTML = '';
            for (let qty = 1; qty <= 5; qty++) {
                const btn = document.createElement('button');
                btn.className = `qty-btn ${qty === 1 ? 'selected' : ''}`;
                btn.textContent = `${qty} шт`;
                btn.onclick = () => selectQuantity(qty);
                qtyContainer.appendChild(btn);
            }
            
            updateTotalPrice();
            
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('product-screen').classList.remove('hidden');
        };

        function selectQuantity(qty) {
            state.selectedQuantity = qty;
            
            document.querySelectorAll('.qty-btn').forEach((btn, index) => {
                if (index + 1 === qty) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
            
            updateTotalPrice();
        }

        function updateTotalPrice() {
            if (state.selectedProduct) {
                const total = state.selectedProduct.price * state.selectedQuantity;
                document.getElementById('total-price').textContent = `${total.toLocaleString()} ₽`;
            }
        }

        // Оформление заказа (используем ТЕКУЩИЙ город из state)
        function placeOrder() {
            if (!state.selectedProduct) return;
            
            const total = state.selectedProduct.price * state.selectedQuantity;
            
            // ПОЛУЧАЕМ ГОРОД ИЗ СОСТОЯНИЯ (уже сохранен в localStorage)
            const currentCity = state.city;
            
            console.log('📦 Оформление заказа:');
            console.log('   - Город:', currentCity);
            console.log('   - Товар:', state.selectedProduct.name);
            console.log('   - Количество:', state.selectedQuantity);
            console.log('   - Сумма:', total);
            
            const orderData = {
                action: 'order',
                productId: state.selectedProduct.id,
                productName: state.selectedProduct.name,
                quantity: state.selectedQuantity,
                totalPrice: total,
                city: currentCity  // Используем город из состояния
            };
            
            // Отправляем в бота
            tg.sendData(JSON.stringify(orderData));
        }

        // ===== ОБРАБОТЧИКИ СОБЫТИЙ =====
        
        document.getElementById('city-header').addEventListener('click', openCityModal);
        document.getElementById('close-modal-btn').addEventListener('click', closeCityModal);
        document.getElementById('confirm-city-btn').addEventListener('click', confirmCity);
        
        document.getElementById('city-modal-overlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('city-modal-overlay')) {
                closeCityModal();
            }
        });

        document.getElementById('back-to-catalog').addEventListener('click', () => {
            document.getElementById('product-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        });

        document.getElementById('back-to-catalog-from-detail').addEventListener('click', () => {
            document.getElementById('product-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        });

        document.getElementById('order-btn').addEventListener('click', placeOrder);

        document.getElementById('continue-shopping').addEventListener('click', () => {
            document.getElementById('confirmation-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        });

        document.getElementById('close-app').addEventListener('click', () => {
            tg.close();
        });

        // ИНИЦИАЛИЗАЦИЯ
        initializeCity();  // Теперь город загружается правильно
        loadProducts();

        // Дополнительная проверка при загрузке страницы
        window.addEventListener('load', () => {
            console.log('Текущий город после загрузки:', state.city);
        });
    </script>
