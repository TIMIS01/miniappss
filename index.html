<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Mini App</title>
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 20px;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .city-info {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--tg-theme-accent-text-color, #2481cc);
        }
        
        .welcome-text {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .product-card {
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 12px;
            padding: 16px;
            transition: transform 0.2s;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            cursor: pointer;
        }
        
        .product-card:active {
            transform: scale(0.98);
        }
        
        .product-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .product-price {
            color: var(--tg-theme-button-color, #40a7e3);
            font-weight: 700;
            font-size: 18px;
        }
        
        .quantity-selector {
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .quantity-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .quantity-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .qty-btn {
            flex: 1;
            min-width: 60px;
            padding: 12px;
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }
        
        .qty-btn:active {
            opacity: 0.8;
        }
        
        .total-price {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin: 16px 0;
            padding: 12px;
            background: var(--tg-theme-bg-color, #ffffff);
            border-radius: 8px;
        }
        
        .action-btn {
            width: 100%;
            padding: 16px;
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .back-btn {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }
        
        .order-confirmation {
            text-align: center;
            padding: 30px 20px;
        }
        
        .checkmark {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Главный экран с товарами -->
    <div id="main-screen">
        <div class="header">
            <div class="city-info" id="city-display">Город: не выбран</div>
            <div class="welcome-text">Выберите товар из каталога:</div>
        </div>
        <div class="products-grid" id="products-grid">
            <!-- Товары будут загружены через JavaScript -->
        </div>
    </div>
    
    <!-- Экран выбора количества -->
    <div id="quantity-screen" class="hidden">
        <div class="header">
            <div class="city-info" id="selected-product-title">Товар</div>
        </div>
        <div class="quantity-selector">
            <div class="quantity-title">Выберите количество:</div>
            <div class="quantity-buttons" id="quantity-buttons">
                <!-- Кнопки количества будут сгенерированы -->
            </div>
            <div class="total-price" id="total-price">0 руб.</div>
            <button class="action-btn" id="order-btn">✅ Оформить заказ</button>
            <button class="action-btn back-btn" id="back-to-catalog-btn">⬅️ Назад в каталог</button>
        </div>
    </div>
    
    <!-- Экран подтверждения -->
    <div id="confirmation-screen" class="hidden">
        <div class="order-confirmation">
            <div class="checkmark">✅</div>
            <h2>Заказ оформлен!</h2>
            <p id="order-details"></p>
            <button class="action-btn" id="continue-shopping-btn">🛍️ Продолжить покупки</button>
            <button class="action-btn back-btn" id="close-app-btn">🔚 Закрыть</button>
        </div>
    </div>
    
    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        
        // Данные товаров (должны совпадать с PRODUCTS в bot.py)
        const PRODUCTS = {
            1: { id: 1, name: "Шишки 🌰", price: 3000 },
            2: { id: 2, name: "Гашиш 🪴", price: 3600 },
            3: { id: 3, name: "Амфетамин  💊 ", price: 2200 },
            4: { id: 4, name: "Экстази 🍃", price: 1200 },
            5: { id: 5, name: "Меф 🧂", price: 1700 },
            6: { id: 6, name: "А - кристалл 💎", price: 5500 },
            7: { id: 7, name: "Психотропные грибы 🍄", price: 500 },
            8: { id: 8, name: "Лирика 💧", price: 8000 },
        };
        
        // Состояние приложения
        let state = {
            city: '',
            selectedProduct: null,
            selectedQuantity: 1,
            initData: null
        };
        
        // Получаем данные инициализации от Telegram
        tg.ready();
        tg.expand(); // Разворачиваем на весь экран
        
        // Парсим initDataUnsafe
        const initData = tg.initDataUnsafe;
        if (initData && initData.user) {
            console.log('Пользователь:', initData.user);
            // Можно получить город из бота, если он был передан
            if (initData.start_param) {
                state.city = decodeURIComponent(initData.start_param);
            }
        }
        
        // Загрузка товаров на главный экран
        function loadProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            Object.values(PRODUCTS).forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => selectProduct(product.id);
                card.innerHTML = `
                    <div class="product-title">${product.name}</div>
                    <div class="product-price">${product.price.toLocaleString()} руб.</div>
                `;
                grid.appendChild(card);
            });
        }
        
        // Выбор товара
        function selectProduct(productId) {
            state.selectedProduct = PRODUCTS[productId];
            document.getElementById('selected-product-title').textContent = state.selectedProduct.name;
            
            // Генерируем кнопки количества
            const qtyContainer = document.getElementById('quantity-buttons');
            qtyContainer.innerHTML = '';
            
            for (let qty = 1; qty <= 5; qty++) {
                const btn = document.createElement('button');
                btn.className = 'qty-btn';
                btn.textContent = `${qty} гр`;
                btn.onclick = () => selectQuantity(qty);
                qtyContainer.appendChild(btn);
            }
            
            // Показываем экран выбора количества
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('quantity-screen').classList.remove('hidden');
            
            // Обновляем цену
            updateTotalPrice();
        }
        
        // Выбор количества
        function selectQuantity(qty) {
            state.selectedQuantity = qty;
            updateTotalPrice();
            
            // Подсвечиваем выбранную кнопку
            const buttons = document.querySelectorAll('.qty-btn');
            buttons.forEach((btn, index) => {
                if (index + 1 === qty) {
                    btn.style.opacity = '1';
                    btn.style.transform = 'scale(0.95)';
                } else {
                    btn.style.opacity = '0.7';
                    btn.style.transform = 'scale(1)';
                }
            });
        }
        
        // Обновление общей цены
        function updateTotalPrice() {
            if (state.selectedProduct) {
                const total = state.selectedProduct.price * state.selectedQuantity;
                document.getElementById('total-price').textContent = `${total.toLocaleString()} руб.`;
            }
        }
        
        // Оформление заказа
        function placeOrder() {
            if (!state.selectedProduct) return;
            
            const total = state.selectedProduct.price * state.selectedQuantity;
            
            // Отправляем данные обратно в бота
            const orderData = {
                action: 'order',
                productId: state.selectedProduct.id,
                productName: state.selectedProduct.name,
                quantity: state.selectedQuantity,
                totalPrice: total,
                city: state.city
            };
            
            // Отправляем данные в бота
            tg.sendData(JSON.stringify(orderData));
            
            // Показываем экран подтверждения
            document.getElementById('quantity-screen').classList.add('hidden');
            document.getElementById('confirmation-screen').classList.remove('hidden');
            
            const orderDetails = document.getElementById('order-details');
            orderDetails.innerHTML = `
                Товар: ${state.selectedProduct.name}<br>
                Количество: ${state.selectedQuantity} шт.<br>
                Сумма: ${total.toLocaleString()} руб.
            `;
        }
        
        // Возврат в каталог
        function backToCatalog() {
            document.getElementById('quantity-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            state.selectedProduct = null;
            state.selectedQuantity = 1;
        }
        
        // Обновление города (вызывается из бота)
        function updateCity(city) {
            state.city = city;
            document.getElementById('city-display').textContent = `Город: ${city}`;
        }
        
        // Настройка кнопок
        document.getElementById('order-btn').onclick = placeOrder;
        document.getElementById('back-to-catalog-btn').onclick = backToCatalog;
        document.getElementById('continue-shopping-btn').onclick = () => {
            document.getElementById('confirmation-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        };
        document.getElementById('close-app-btn').onclick = () => tg.close();
        
        // Главная кнопка Telegram (не используется, но можно настроить)
        tg.MainButton.setText('ЗАКАЗАТЬ');
        tg.MainButton.onClick(placeOrder);
        
        // Загружаем товары при старте
        loadProducts();
        
        // Если город передан в параметрах, обновляем отображение
        if (initData && initData.start_param) {
            updateCity(initData.start_param);
        }
    </script>
</body>
</html>
