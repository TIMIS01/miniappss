<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ Магазин Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --tg-color-scheme: light;
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-hint-color: #999999;
            --tg-theme-link-color: #2481cc;
            --tg-theme-button-color: #40a7e3;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #f0f0f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --tg-theme-bg-color: #1f1f1f;
                --tg-theme-text-color: #ffffff;
                --tg-theme-hint-color: #aaaaaa;
                --tg-theme-link-color: #5f9cea;
                --tg-theme-button-color: #5f9cea;
                --tg-theme-button-text-color: #ffffff;
                --tg-theme-secondary-bg-color: #2c2c2c;
            }
        }

        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .city-header {
            background: linear-gradient(135deg, var(--tg-theme-button-color), #5f9cea);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(64, 167, 227, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .city-header:active {
            transform: scale(0.98);
        }

        .city-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 4px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .city-name {
            font-size: 28px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .change-city-icon {
            font-size: 18px;
            opacity: 0.8;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .city-modal {
            background: var(--tg-theme-bg-color);
            border-radius: 30px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.show .city-modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--tg-theme-text-color);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .city-item {
            padding: 14px 8px;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .city-item.selected {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .city-item:active {
            transform: scale(0.95);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .product-card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: var(--tg-theme-bg-color);
        }

        .product-info {
            padding: 12px;
        }

        .product-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .product-price {
            color: var(--tg-theme-button-color);
            font-weight: 700;
            font-size: 16px;
        }

        .product-detail {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .detail-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: var(--tg-theme-bg-color);
        }

        .detail-content {
            padding: 20px;
        }

        .detail-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .detail-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--tg-theme-button-color);
            margin-bottom: 24px;
        }

        .quantity-selector {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .quantity-label {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        .quantity-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .qty-btn {
            flex: 1;
            min-width: 60px;
            padding: 14px 8px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            border: 2px solid transparent;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .qty-btn.selected {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border-color: var(--tg-theme-button-color);
        }

        .total-price {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin: 16px 0;
            padding: 16px;
            background: var(--tg-theme-bg-color);
            border-radius: 16px;
        }

        .promo-section {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .promo-input-group {
            display: flex;
            gap: 8px;
        }

        .promo-input {
            flex: 1;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--tg-theme-hint-color);
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 14px;
        }

        .promo-button {
            width: auto;
            padding: 12px 24px;
            margin: 0;
        }

        .promo-message {
            font-size: 12px;
            margin-top: 8px;
            color: var(--tg-theme-hint-color);
        }

        .button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }

        .button:active {
            opacity: 0.8;
        }

        .button-primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .button-secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        .confirmation-screen {
            text-align: center;
            padding: 20px 20px 30px;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 16px;
            animation: scaleIn 0.5s;
        }

        .order-details {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .order-detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        }

        .order-detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            opacity: 0.7;
        }

        .detail-value {
            font-weight: 600;
        }

        .total-amount {
            font-size: 28px;
            font-weight: 800;
            color: var(--tg-theme-button-color);
            margin: 20px 0;
        }

        .contact-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed rgba(128, 128, 128, 0.3);
        }

        .contact-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tg-theme-button-color);
        }

        .contact-buttons {
            display: flex;
            gap: 10px;
        }

        .contact-button {
            flex: 1;
            padding: 14px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
        }

        .contact-button:active {
            transform: scale(0.95);
        }

        .contact-button.primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .contact-button.secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .hidden {
            display: none;
        }

        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .back-button {
            background: none;
            border: none;
            color: var(--tg-theme-button-color);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            margin-right: 8px;
        }

        .save-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: var(--tg-theme-hint-color);
        }

        .spinner {
            border: 3px solid var(--tg-theme-secondary-bg-color);
            border-top: 3px solid var(--tg-theme-button-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="modal-overlay" id="city-modal-overlay">
        <div class="city-modal">
            <div class="modal-header">
                <div class="modal-title">🏙️ Выберите город</div>
                <button class="close-modal" id="close-modal-btn">&times;</button>
            </div>
            <div class="cities-grid" id="cities-grid"></div>
            <button class="button button-primary" id="confirm-city-btn">Подтвердить</button>
        </div>
    </div>

    <div id="main-screen">
        <div class="city-header" id="city-header">
            <div class="city-title">
                <span>🏙️ ВАШ ГОРОД</span>
                <span class="change-city-icon">▼</span>
            </div>
            <div class="city-name" id="city-display">
                <span id="city-name-text">ЗАГРУЗКА...</span>
                <span class="save-indicator" id="save-indicator" style="display: none;"></span>
            </div>
        </div>

        <button class="button button-secondary" id="contact-admin-main" style="margin-bottom: 20px;">
            📞 Связаться с администратором
        </button>

        <div id="products-grid" class="products-grid">
            <div class="loading">
                <div class="spinner"></div>
                Загрузка товаров...
            </div>
        </div>
    </div>

    <div id="product-screen" class="hidden">
        <div class="nav-bar">
            <button class="back-button" id="back-to-catalog">←</button>
            <span class="nav-title" id="product-nav-title">Товар</span>
        </div>
        
        <div class="product-detail">
            <img class="detail-image" id="detail-image" src="" alt="product">
            <div class="detail-content">
                <div class="detail-title" id="detail-title">Название</div>
                <div class="detail-price" id="detail-price">0 ₽</div>
            </div>
        </div>

        <div class="quantity-selector">
            <div class="quantity-label">📦 Количество (грамм)</div>
            <div class="quantity-buttons" id="quantity-buttons"></div>
            <div class="total-price" id="total-price">0 ₽</div>
        </div>

        <div class="promo-section">
            <div class="quantity-label">🎫 Промокод</div>
            <div class="promo-input-group">
                <input type="text" id="promo-code-input" class="promo-input" placeholder="Введите промокод">
                <button id="apply-promo-btn" class="button button-secondary promo-button">Применить</button>
            </div>
            <div id="promo-message" class="promo-message"></div>
        </div>

        <button class="button button-primary" id="order-btn">✅ Оформить заказ</button>
        <button class="button button-secondary" id="contact-admin-from-product">📞 Связаться с администратором</button>
        <button class="button button-secondary" id="back-to-catalog-from-detail">⬅️ Продолжить покупки</button>
    </div>

    <div id="confirmation-screen" class="hidden">
        <div class="confirmation-screen">
            <div class="success-icon">🎉</div>
            <h2>Заказ оформлен!</h2>
            
            <div class="order-details" id="order-details"></div>
            <div class="total-amount" id="confirmation-total">0 ₽</div>

            <div class="contact-section">
                <div class="contact-title">📞 Нужна помощь с заказом?</div>
                <div class="contact-buttons">
                    <div class="contact-button primary" id="contact-admin-after-order">
                        Написать администратору
                    </div>
                    <div class="contact-button secondary" id="continue-shopping-after-order">
                        Продолжить покупки
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Telegram Web App инициализация
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // ========== ПОЛУЧЕНИЕ ДАННЫХ ПОЛЬЗОВАТЕЛЯ ==========
        let telegramUser = tg.initDataUnsafe?.user || {};
        
        function getUserFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');
            const username = urlParams.get('username');
            const firstName = urlParams.get('first_name');
            const lastName = urlParams.get('last_name') || '';
            
            if (userId) {
                return {
                    id: parseInt(userId),
                    username: username,
                    first_name: firstName,
                    last_name: lastName,
                    is_from_url: true
                };
            }
            return null;
        }
        
        const urlUser = getUserFromUrl();
        if (urlUser && !telegramUser.id) {
            telegramUser = urlUser;
            console.log('📌 Данные пользователя получены из URL:', telegramUser);
        }
        
        if (!telegramUser.id) {
            const urlParams = new URLSearchParams(window.location.search);
            const userIdFromUrl = urlParams.get('user_id');
            if (userIdFromUrl) {
                telegramUser = {
                    id: parseInt(userIdFromUrl),
                    username: urlParams.get('username') || null,
                    first_name: urlParams.get('first_name') || 'Пользователь',
                    last_name: urlParams.get('last_name') || ''
                };
            }
        }
        
        console.log('👤 ИТОГОВЫЙ ПОЛЬЗОВАТЕЛЬ:', telegramUser);
        console.log('🆔 USER ID:', telegramUser.id);
        console.log('📛 USERNAME:', telegramUser.username);
        
        // ========== ДАННЫЕ ==========
        const CITIES = [
            "Москва", "Санкт-Петербург", "Новосибирск", "Екатеринбург", "Казань",
            "Нижний Новгород", "Челябинск", "Самара", "Омск", "Ростов-на-Дону",
            "Уфа", "Красноярск", "Воронеж", "Пермь", "Волгоград"
        ];
        
        // Локальные товары (резервные, если сервер не ответит)
        const LOCAL_PRODUCTS = [];
        
        // Товары будут загружены с сервера
        let PRODUCTS = [];
        
        // ========== СОСТОЯНИЕ ==========
        let state = {
            city: 'Москва',
            selectedProduct: null,
            selectedQuantity: 1,
            tempSelectedCity: 'Москва',
            appliedPromo: null,
            discountedTotal: 0
        };
        
        let isProcessing = false;
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        const BOT_API_URL = 'https://tg-shop-server.onrender.com/api/webhook';
        
        function showNotification(message, isError = false) {
            tg.showPopup({
                title: isError ? '❌ Ошибка' : '✅ Успешно',
                message: message,
                buttons: [{ type: 'ok' }]
            });
        }
        
        // ========== ЗАГРУЗКА ТОВАРОВ С СЕРВЕРА ==========
        async function loadProductsFromServer() {
            try {
                console.log('🔄 Загрузка товаров с сервера...');
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch('https://tg-shop-server.onrender.com/api/products', {
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'ok' && data.products && data.products.length > 0) {
                        PRODUCTS = data.products.map(p => ({
                            id: p.id,
                            name: p.name,
                            price: p.price,
                            image: p.image || `https://via.placeholder.com/300x200?text=${encodeURIComponent(p.name)}`
                        }));
                        console.log(`✅ Загружено ${PRODUCTS.length} товаров с сервера`);
                        return true;
                    }
                }
                throw new Error('Сервер вернул пустой список');
            } catch (error) {
                console.log('⚠️ Ошибка загрузки товаров с сервера, используем локальные:', error.message);
                PRODUCTS = [...LOCAL_PRODUCTS];
                return false;
            }
        }
        
        // ========== ОТПРАВКА ДАННЫХ ==========
        async function sendOrderToBackend(orderData) {
            let pendingOrders = JSON.parse(localStorage.getItem('pending_orders') || '[]');
            pendingOrders.push({
                ...orderData,
                savedAt: new Date().toISOString()
            });
            localStorage.setItem('pending_orders', JSON.stringify(pendingOrders));
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);
                
                const response = await fetch(BOT_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const updated = pendingOrders.filter(o => o.timestamp !== orderData.timestamp);
                    localStorage.setItem('pending_orders', JSON.stringify(updated));
                    console.log('✅ Заказ отправлен на сервер');
                    return true;
                }
                return false;
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('⏰ Таймаут отправки заказа, данные сохранены локально');
                } else {
                    console.log('❌ Ошибка отправки:', error);
                }
                return false;
            }
        }
        
        // ========== ПРОМОКОДЫ ==========
        async function applyPromoCode() {
            const promoInput = document.getElementById('promo-code-input');
            const promoMessage = document.getElementById('promo-message');
            const code = promoInput.value.trim();
            
            if (!code) {
                promoMessage.textContent = '❌ Введите промокод';
                promoMessage.style.color = 'red';
                return;
            }
            
            promoMessage.textContent = '⏳ Проверка промокода...';
            promoMessage.style.color = 'var(--tg-theme-hint-color)';
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                
                const response = await fetch(`https://tg-shop-server.onrender.com/api/check-promo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: code,
                        userId: telegramUser.id,
                        orderAmount: state.selectedProduct.price * state.selectedQuantity
                    }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                const result = await response.json();
                
                if (result.status === 'ok') {
                    state.appliedPromo = result.promo;
                    const originalTotal = state.selectedProduct.price * state.selectedQuantity;
                    
                    let discountAmount = 0;
                    if (result.promo.type === 'percent') {
                        discountAmount = originalTotal * result.promo.value / 100;
                    } else {
                        discountAmount = Math.min(result.promo.value, originalTotal);
                    }
                    
                    const newTotal = originalTotal - discountAmount;
                    state.discountedTotal = newTotal;
                    
                    promoMessage.innerHTML = `✅ Промокод применен! Скидка: ${result.promo.value}${result.promo.type === 'percent' ? '%' : ' руб'} (-${discountAmount} руб)`;
                    promoMessage.style.color = '#4CAF50';
                    
                    document.getElementById('total-price').innerHTML = `
                        <div style="text-decoration: line-through; color: gray;">${originalTotal.toLocaleString()} ₽</div>
                        <div style="color: #4CAF50; font-size: 20px;">${newTotal.toLocaleString()} ₽</div>
                    `;
                } else {
                    promoMessage.textContent = `❌ ${result.message}`;
                    promoMessage.style.color = 'red';
                    state.appliedPromo = null;
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    promoMessage.textContent = '⏰ Сервер не отвечает, попробуйте позже';
                } else {
                    promoMessage.textContent = '❌ Ошибка проверки промокода';
                }
                promoMessage.style.color = 'red';
                console.error('Ошибка:', error);
                state.appliedPromo = null;
            }
        }
        
        // ========== ФУНКЦИИ ГОРОДА ==========
        function initializeCity() {
            try {
                const savedCity = localStorage.getItem('selected_city');
                if (savedCity && CITIES.includes(savedCity)) {
                    state.city = savedCity;
                    state.tempSelectedCity = savedCity;
                } else {
                    const urlParams = new URLSearchParams(window.location.search);
                    const urlCity = urlParams.get('city');
                    if (urlCity && CITIES.includes(decodeURIComponent(urlCity))) {
                        state.city = decodeURIComponent(urlCity);
                        state.tempSelectedCity = state.city;
                        localStorage.setItem('selected_city', state.city);
                    }
                }
            } catch (e) {
                console.error('Ошибка загрузки города:', e);
            }
            updateCityDisplay();
        }
        
        function updateCityDisplay() {
            const cityElement = document.getElementById('city-name-text');
            if (cityElement) cityElement.textContent = state.city;
        }
        
        function loadCitiesModal() {
            const grid = document.getElementById('cities-grid');
            if (!grid) return;
            grid.innerHTML = CITIES.map(city => `
                <div class="city-item ${city === state.city ? 'selected' : ''}" onclick="selectTempCity('${city}')">
                    ${city}
                </div>
            `).join('');
        }
        
        window.selectTempCity = function(city) {
            state.tempSelectedCity = city;
            document.querySelectorAll('.city-item').forEach(el => {
                if (el.textContent.trim() === city) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
        };
        
        function confirmCity() {
            if (state.tempSelectedCity !== state.city) {
                state.city = state.tempSelectedCity;
                localStorage.setItem('selected_city', state.city);
                updateCityDisplay();
                loadCitiesModal();
                
                const indicator = document.getElementById('save-indicator');
                if (indicator) {
                    indicator.style.display = 'inline-block';
                    setTimeout(() => indicator.style.display = 'none', 2000);
                }
            }
            closeCityModal();
        }
        
        function openCityModal() {
            state.tempSelectedCity = state.city;
            loadCitiesModal();
            document.getElementById('city-modal-overlay').classList.add('show');
        }
        
        function closeCityModal() {
            document.getElementById('city-modal-overlay').classList.remove('show');
        }
        
        // ========== ТОВАРЫ ==========
        function loadProducts() {
            const grid = document.getElementById('products-grid');
            if (!grid) return;
            
            if (!PRODUCTS.length) {
                grid.innerHTML = '<div class="loading"><div class="spinner"></div>Загрузка товаров...</div>';
                return;
            }
            
            grid.innerHTML = PRODUCTS.map(product => `
                <div class="product-card" onclick="selectProduct(${product.id})">
                    <img class="product-image" src="${product.image}" alt="${product.name}" 
                         onerror="this.src='https://via.placeholder.com/300x200/cccccc/666666?text=${encodeURIComponent(product.name)}'">
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${product.price.toLocaleString()} ₽</div>
                    </div>
                </div>
            `).join('');
        }
        
        window.selectProduct = function(productId) {
            state.selectedProduct = PRODUCTS.find(p => p.id === productId);
            state.selectedQuantity = 1;
            state.appliedPromo = null;
            
            const detailImage = document.getElementById('detail-image');
            if (detailImage) {
                detailImage.src = state.selectedProduct.image;
                detailImage.alt = state.selectedProduct.name;
            }
            
            const detailTitle = document.getElementById('detail-title');
            const detailPrice = document.getElementById('detail-price');
            
            if (detailTitle) detailTitle.textContent = state.selectedProduct.name;
            if (detailPrice) detailPrice.textContent = state.selectedProduct.price.toLocaleString() + ' ₽';
            
            const qtyContainer = document.getElementById('quantity-buttons');
            if (qtyContainer) {
                qtyContainer.innerHTML = '';
                for (let qty = 1; qty <= 10; qty++) {
                    const btn = document.createElement('button');
                    btn.className = `qty-btn ${qty === 1 ? 'selected' : ''}`;
                    btn.textContent = `${qty} гр`;
                    btn.onclick = () => selectQuantity(qty);
                    qtyContainer.appendChild(btn);
                }
            }
            
            updateTotalPrice();
            
            const promoInput = document.getElementById('promo-code-input');
            if (promoInput) promoInput.value = '';
            const promoMessage = document.getElementById('promo-message');
            if (promoMessage) promoMessage.innerHTML = '';
            
            document.getElementById('main-screen')?.classList.add('hidden');
            document.getElementById('product-screen')?.classList.remove('hidden');
        };
        
        function selectQuantity(qty) {
            state.selectedQuantity = qty;
            state.appliedPromo = null;
            
            document.querySelectorAll('.qty-btn').forEach((btn, index) => {
                if (index + 1 === qty) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
            
            updateTotalPrice();
            
            const promoInput = document.getElementById('promo-code-input');
            if (promoInput) promoInput.value = '';
            const promoMessage = document.getElementById('promo-message');
            if (promoMessage) promoMessage.innerHTML = '';
        }
        
        function updateTotalPrice() {
            if (state.selectedProduct) {
                const total = state.selectedProduct.price * state.selectedQuantity;
                const totalElement = document.getElementById('total-price');
                if (totalElement) totalElement.innerHTML = `${total.toLocaleString()} ₽`;
            }
        }
        
        // ========== ОФОРМЛЕНИЕ ЗАКАЗА ==========
        async function placeOrder() {
            if (isProcessing) {
                showNotification('Заказ уже оформляется, пожалуйста, подождите...');
                return;
            }
            
            if (!state.selectedProduct) {
                showNotification('Выберите товар', true);
                return;
            }
            
            isProcessing = true;
            
            const orderBtn = document.getElementById('order-btn');
            const originalText = orderBtn?.textContent || 'Оформить заказ';
            if (orderBtn) {
                orderBtn.textContent = '⏳ Оформление...';
                orderBtn.disabled = true;
            }
            
            try {
                const originalTotal = state.selectedProduct.price * state.selectedQuantity;
                let finalTotal = originalTotal;
                let promoData = null;
                
                if (state.appliedPromo) {
                    if (state.appliedPromo.type === 'percent') {
                        finalTotal = originalTotal - (originalTotal * state.appliedPromo.value / 100);
                    } else {
                        finalTotal = Math.max(0, originalTotal - state.appliedPromo.value);
                    }
                    promoData = state.appliedPromo;
                }
                
                const orderData = {
                    action: 'order',
                    productId: state.selectedProduct.id,
                    productName: state.selectedProduct.name,
                    quantity: state.selectedQuantity,
                    totalPrice: originalTotal,
                    finalPrice: Math.round(finalTotal),
                    city: state.city,
                    userId: telegramUser.id,
                    username: telegramUser.username,
                    firstName: telegramUser.first_name,
                    lastName: telegramUser.last_name,
                    fullName: [telegramUser.first_name, telegramUser.last_name].filter(Boolean).join(' ') || 'Пользователь',
                    promocode: promoData,
                    timestamp: new Date().toISOString()
                };
                
                console.log('📦 Оформление заказа:', orderData);
                
                await sendOrderToBackend(orderData);
                
                state.lastOrder = orderData;
                
                document.getElementById('product-screen')?.classList.add('hidden');
                document.getElementById('confirmation-screen')?.classList.remove('hidden');
                
                const orderDetails = document.getElementById('order-details');
                if (orderDetails) {
                    orderDetails.innerHTML = `
                        <div class="order-detail-item">
                            <span class="detail-label">👤 Покупатель:</span>
                            <span class="detail-value">${orderData.fullName} ${orderData.username ? '@' + orderData.username : ''}</span>
                        </div>
                        <div class="order-detail-item">
                            <span class="detail-label">🆔 ID:</span>
                            <span class="detail-value">${orderData.userId || 'не указан'}</span>
                        </div>
                        <div class="order-detail-item">
                            <span class="detail-label">🏙️ Город:</span>
                            <span class="detail-value">${state.city}</span>
                        </div>
                        <div class="order-detail-item">
                            <span class="detail-label">📦 Товар:</span>
                            <span class="detail-value">${state.selectedProduct.name}</span>
                        </div>
                        <div class="order-detail-item">
                            <span class="detail-label">📊 Количество:</span>
                            <span class="detail-value">${state.selectedQuantity} гр</span>
                        </div>
                        <div class="order-detail-item">
                            <span class="detail-label">💰 Цена за гр:</span>
                            <span class="detail-value">${state.selectedProduct.price.toLocaleString()} ₽</span>
                        </div>
                        ${promoData ? `
                        <div class="order-detail-item">
                            <span class="detail-label">🎫 Промокод:</span>
                            <span class="detail-value">${promoData.code} (${promoData.value}${promoData.type === 'percent' ? '%' : ' руб'})</span>
                        </div>
                        ` : ''}
                    `;
                }
                
                const totalAmount = document.getElementById('confirmation-total');
                if (totalAmount) totalAmount.textContent = `${Math.round(finalTotal).toLocaleString()} ₽`;
                
                showNotification(`Заказ оформлен!\n${state.selectedProduct.name} x${state.selectedQuantity} = ${Math.round(finalTotal)} руб.\nМенеджер свяжется с вами.`);
                
            } catch (error) {
                console.error('Ошибка при оформлении заказа:', error);
                showNotification('Не удалось оформить заказ. Данные сохранены локально.', true);
            } finally {
                setTimeout(() => {
                    isProcessing = false;
                    if (orderBtn) {
                        orderBtn.textContent = originalText;
                        orderBtn.disabled = false;
                    }
                }, 2000);
            }
        }
        
        // ========== СВЯЗЬ С АДМИНИСТРАТОРОМ ==========
        async function contactAdmin() {
            const contactData = {
                action: 'contact_admin',
                city: state.city,
                message: 'Пользователь хочет связаться с администратором',
                userId: telegramUser.id,
                username: telegramUser.username,
                firstName: telegramUser.first_name,
                lastName: telegramUser.last_name,
                fullName: [telegramUser.first_name, telegramUser.last_name].filter(Boolean).join(' ') || 'Пользователь',
                timestamp: new Date().toISOString()
            };
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                
                await fetch(BOT_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(contactData),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                showNotification('Запрос отправлен администратору! Он свяжется с вами в ближайшее время.');
            } catch (error) {
                if (error.name === 'AbortError') {
                    showNotification('Сервер не отвечает, но запрос сохранен. Администратор свяжется с вами.');
                } else {
                    showNotification('Запрос сохранен. Администратор свяжется с вами при следующем входе.');
                }
            }
        }
        
        // ========== НАВИГАЦИЯ ==========
        function goToMainScreen() {
            document.getElementById('product-screen')?.classList.add('hidden');
            document.getElementById('confirmation-screen')?.classList.add('hidden');
            document.getElementById('main-screen')?.classList.remove('hidden');
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        async function init() {
            console.log('🚀 Инициализация Mini App...');
            console.log('👤 Пользователь:', telegramUser);
            
            initializeCity();
            
            // Загружаем товары с сервера
            await loadProductsFromServer();
            loadProducts();
            
            const cityHeader = document.getElementById('city-header');
            if (cityHeader) cityHeader.addEventListener('click', openCityModal);
            
            const closeModal = document.getElementById('close-modal-btn');
            if (closeModal) closeModal.addEventListener('click', closeCityModal);
            
            const confirmCityBtn = document.getElementById('confirm-city-btn');
            if (confirmCityBtn) confirmCityBtn.addEventListener('click', confirmCity);
            
            const modalOverlay = document.getElementById('city-modal-overlay');
            if (modalOverlay) {
                modalOverlay.addEventListener('click', (e) => {
                    if (e.target === modalOverlay) closeCityModal();
                });
            }
            
            const adminBtns = ['contact-admin-main', 'contact-admin-from-product', 'contact-admin-after-order'];
            adminBtns.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.addEventListener('click', contactAdmin);
            });
            
            const backBtns = ['back-to-catalog', 'back-to-catalog-from-detail', 'continue-shopping-after-order'];
            backBtns.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.addEventListener('click', goToMainScreen);
            });
            
            const orderBtn = document.getElementById('order-btn');
            if (orderBtn) orderBtn.addEventListener('click', placeOrder);
            
            const applyPromoBtn = document.getElementById('apply-promo-btn');
            if (applyPromoBtn) applyPromoBtn.addEventListener('click', applyPromoCode);
            
            console.log('✅ Mini App инициализирован');
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
