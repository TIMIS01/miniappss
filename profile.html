<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отслеживание заказа | PCGGPRO</title>
    <style>
        :root {
            --primary: #4a9eff;
            --primary-dark: #3a7fd4;
            --primary-glow: rgba(74, 158, 255, 0.3);
            --secondary: #00d4aa;
            --bg-dark: #0a0e1a;
            --bg-card: #111827;
            --bg-header: #0d1321;
            --text: #e0e6f0;
            --text-muted: #8899aa;
            --border: #1e2a3a;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --radius: 16px;
            --danger: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Inter', Arial, sans-serif; background: var(--bg-dark); color: var(--text); line-height: 1.6; min-height: 100vh; }

        .header { background: var(--bg-header); box-shadow: 0 2px 15px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .header-inner { max-width: 1200px; margin: 0 auto; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 26px; font-weight: 800; color: var(--primary); text-decoration: none; }
        .nav { display: flex; gap: 25px; align-items: center; }
        .nav a { text-decoration: none; color: var(--text-muted); font-weight: 500; font-size: 15px; }
        .nav a:hover { color: var(--primary); }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        .search-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 25px; margin-bottom: 25px; text-align: center; }
        .search-box h2 { font-size: 20px; margin-bottom: 15px; }
        .search-box input { padding: 14px 16px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; width: 300px; max-width: 100%; }
        .search-box button { padding: 14px 24px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-left: 10px; }
        .search-box button:hover { background: var(--primary-dark); }

        .orders-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px; }
        .orders-card h2 { font-size: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 10px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
        td { padding: 15px 10px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-new { background: rgba(74, 158, 255, 0.2); color: var(--primary); }
        .badge-process { background: rgba(243, 156, 18, 0.2); color: #f39c12; }
        .badge-building { background: rgba(155, 89, 182, 0.2); color: #9b59b6; }
        .badge-sent { background: rgba(0, 212, 170, 0.2); color: var(--secondary); }

        .empty { text-align: center; padding: 40px; color: var(--text-muted); }
        .error { text-align: center; padding: 20px; color: var(--danger); }

        @media (max-width: 600px) {
            .header-inner { flex-direction: column; gap: 10px; }
            .nav { gap: 15px; flex-wrap: wrap; justify-content: center; }
            .search-box input { width: 100%; margin-bottom: 10px; }
            .search-box button { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="https://timis01.github.io/miniappss/" class="logo">🖥️ PCGG<span>PRO</span></a>
        <nav class="nav">
            <a href="https://timis01.github.io/miniappss/">Главная</a>
            <a href="https://timis01.github.io/miniappss/#catalog">Каталог</a>
            <a href="https://timis01.github.io/miniappss/offer.html">Оферта</a>
            <a href="https://timis01.github.io/miniappss/cart.html">🛒 Корзина</a>
        </nav>
    </div>
</header>

<div class="container">
    <div class="search-box">
        <h2>📦 Отследить заказ</h2>
        <p style="color: var(--text-muted); margin-bottom: 15px;">Введите ваш email, чтобы увидеть ваши заказы</p>
        <input type="email" id="searchEmail" placeholder="example@mail.ru">
        <button onclick="searchOrders()">🔍 Найти заказы</button>
        <div class="error" id="searchError" style="display: none;"></div>
    </div>

    <div class="orders-card">
        <h2>📋 Мои заказы</h2>
        <div id="ordersList">
            <div class="empty">Введите email и нажмите «Найти заказы»</div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://tg-shop-server.onrender.com/api';

    // Автоматически подставляем последний искавшийся email (для удобства)
    const lastSearchedEmail = localStorage.getItem('lastSearchedEmail');
    if (lastSearchedEmail) {
        document.getElementById('searchEmail').value = lastSearchedEmail;
        searchOrders(); // Сразу показываем заказы при загрузке страницы
    }

    async function searchOrders() {
        const email = document.getElementById('searchEmail').value.trim();
        const errorDiv = document.getElementById('searchError');
        const container = document.getElementById('ordersList');

        if (!email || !email.includes('@') || !email.includes('.')) {
            errorDiv.textContent = 'Пожалуйста, введите корректный email.';
            errorDiv.style.display = 'block';
            return;
        }

        // Сохраняем email для следующего раза
        localStorage.setItem('lastSearchedEmail', email);

        errorDiv.style.display = 'none';
        container.innerHTML = '<div class="empty">Поиск заказов...</div>';

        try {
            const response = await fetch(`${API_URL}/orders/by-email?email=${encodeURIComponent(email)}`);
            const data = await response.json();
            const orders = data.orders || [];

            if (orders.length === 0) {
                container.innerHTML = '<div class="empty">Заказы с таким email не найдены.</div>';
                return;
            }

            const statusBadges = {
                'оформлен': 'badge-new',
                'принят': 'badge-process',
                'в сборке': 'badge-building',
                'отправлен': 'badge-sent'
            };

            const statusNames = {
                'оформлен': 'Оформлен',
                'принят': 'Принят',
                'в сборке': 'В сборке',
                'отправлен': 'Отправлен'
            };

            container.innerHTML = `
                <table>
                    <thead>
                        <tr><th>ID</th><th>Товар</th><th>Сумма</th><th>Город</th><th>Статус</th><th>Трек-номер</th><th>Дата</th></tr>
                    </thead>
                    <tbody>
                        ${orders.map(o => {
                            const date = new Date(o.created_at || o.order_date);
                            return `
                                <tr>
                                    <td>#${o.id}</td>
                                    <td>${o.product_name || '—'}</td>
                                    <td>${(o.total_price || 0).toLocaleString()} ₽</td>
                                    <td>${o.city || '—'}</td>
                                    <td><span class="badge ${statusBadges[o.status] || 'badge-new'}">${statusNames[o.status] || o.status || 'Оформлен'}</span></td>
                                    <td>${o.tracking_number || '—'}</td>
                                    <td>${date.toLocaleDateString('ru-RU')}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        } catch (error) {
            container.innerHTML = '<div class="empty">Ошибка загрузки заказов.</div>';
        }
    }
</script>

</body>
</html>
