<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина | PCGGPRO</title>
    <style>
        :root {
            --primary: #4a9eff;
            --primary-dark: #3a7fd4;
            --primary-glow: rgba(74, 158, 255, 0.3);
            --secondary: #00d4aa;
            --bg-dark: #0a0e1a;
            --bg-card: #111827;
            --bg-header: #0d1321;
            --text: #e0e6f0;
            --text-muted: #8899aa;
            --border: #1e2a3a;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-hover: 0 8px 30px rgba(74, 158, 255, 0.15);
            --radius: 16px;
            --danger: #e74c3c;
            --danger-dark: #c0392b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Inter', Arial, sans-serif; background: var(--bg-dark); color: var(--text); line-height: 1.6; min-height: 100vh; }

        .header { background: var(--bg-header); box-shadow: 0 2px 15px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .header-inner { max-width: 1200px; margin: 0 auto; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 26px; font-weight: 800; color: var(--primary); text-decoration: none; text-shadow: 0 0 20px var(--primary-glow); }
        .logo span { color: var(--text); }
        .nav { display: flex; gap: 25px; align-items: center; }
        .nav a { text-decoration: none; color: var(--text-muted); font-weight: 500; transition: color 0.3s; font-size: 15px; }
        .nav a:hover { color: var(--primary); }
        #cart-count { background: var(--secondary); color: #000; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 700; }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .back-link { color: var(--text-muted); text-decoration: none; font-size: 14px; display: inline-block; margin-bottom: 30px; transition: color 0.3s; }
        .back-link:hover { color: var(--primary); }

        h1 { font-size: 32px; margin-bottom: 30px; color: var(--text); text-align: center; }
        .empty-cart { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-cart div { font-size: 64px; margin-bottom: 20px; }

        .cart-items { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .cart-item { display: flex; align-items: center; gap: 20px; background: var(--bg-card); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-size: 18px; font-weight: 600; margin-bottom: 5px; color: var(--text); }
        .cart-item-price { font-size: 14px; color: var(--text-muted); }
        .cart-item-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: var(--bg-dark); border: 1px solid var(--border); color: var(--text); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .qty-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .qty-input { width: 40px; text-align: center; background: var(--bg-dark); border: 1px solid var(--border); color: var(--text); padding: 5px; border-radius: 8px; }
        .remove-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 14px; padding: 5px 10px; border-radius: 8px; transition: background 0.2s; }
        .remove-btn:hover { background: rgba(231, 76, 60, 0.1); }

        .summary { background: var(--bg-card); border-radius: var(--radius); padding: 25px; border: 1px solid var(--border); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border); color: var(--text-muted); }
        .summary-total { display: flex; justify-content: space-between; font-size: 22px; font-weight: 700; color: var(--secondary); margin-bottom: 25px; }
        .btn-checkout { display: block; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.3s; text-align: center; text-decoration: none; }
        .btn-checkout:hover { background: var(--primary-dark); box-shadow: 0 0 25px var(--primary-glow); }

        @media (max-width: 600px) {
            .cart-item { flex-direction: column; align-items: flex-start; }
            .cart-item-controls { align-self: flex-end; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="https://timis01.github.io/miniappss/" class="logo">🖥️ PCGG<span>PRO</span></a>
        <nav class="nav">
            <a href="https://timis01.github.io/miniappss/">Главная</a>
            <a href="https://timis01.github.io/miniappss/#catalog">Каталог</a>
            <a href="https://timis01.github.io/miniappss/offer.html">Оферта</a>
            <a href="https://timis01.github.io/miniappss/cart.html">🛒 Корзина <span id="cart-count">0</span></a>
            <a href="https://timis01.github.io/miniappss/profile.html">👤 Профиль</a>
        </nav>
    </div>
</header>

<div class="container">
    <a href="https://timis01.github.io/miniappss/" class="back-link">← Продолжить покупки</a>
    <h1>🛒 Корзина</h1>
    
    <div class="cart-items" id="cartItems"></div>
    
    <div class="summary" id="summary" style="display: none;">
        <div class="summary-row">
            <span>Количество товаров:</span>
            <span id="summaryCount">0 шт.</span>
        </div>
        <div class="summary-row">
            <span>Стоимость товаров:</span>
            <span id="summaryPrice">0 ₽</span>
        </div>
        <div class="summary-total">
            <span>Итого:</span>
            <span id="summaryTotal">0 ₽</span>
        </div>
        <a href="https://timis01.github.io/miniappss/checkout.html" class="btn-checkout">🚀 Оформить заказ</a>
    </div>
    
    <div class="empty-cart" id="emptyCart">
        <div>🛒</div>
        <h2>Корзина пуста</h2>
        <p>Добавьте товары из <a href="https://timis01.github.io/miniappss/#catalog" style="color: var(--primary);">каталога</a></p>
    </div>
</div>

<script>
    let cart = [];

    function loadCart() {
        cart = JSON.parse(localStorage.getItem('cart') || '[]');
        renderCart();
    }

    function saveCart() {
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
    }

    function renderCart() {
        const cartItems = document.getElementById('cartItems');
        const emptyCart = document.getElementById('emptyCart');
        const summary = document.getElementById('summary');

        if (cart.length === 0) {
            cartItems.innerHTML = '';
            summary.style.display = 'none';
            emptyCart.style.display = 'block';
            return;
        }

        emptyCart.style.display = 'none';
        summary.style.display = 'block';

        cartItems.innerHTML = cart.map((item, index) => `
            <div class="cart-item">
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-price">${item.price.toLocaleString()} ₽ / шт.</div>
                </div>
                <div class="cart-item-controls">
                    <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
                    <input type="number" class="qty-input" value="${item.quantity}" min="1" onchange="setQty(${index}, this.value)">
                    <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                    <button class="remove-btn" onclick="removeItem(${index})">🗑️</button>
                </div>
            </div>
        `).join('');

        updateSummary();
    }

    function changeQty(index, delta) {
        cart[index].quantity = Math.max(1, (cart[index].quantity || 1) + delta);
        saveCart();
        renderCart();
    }

    function setQty(index, value) {
        const qty = parseInt(value) || 1;
        cart[index].quantity = Math.max(1, qty);
        saveCart();
        renderCart();
    }

    function removeItem(index) {
        cart.splice(index, 1);
        saveCart();
        renderCart();
    }

    function updateSummary() {
        const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
        const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        document.getElementById('summaryCount').textContent = `${totalCount} шт.`;
        document.getElementById('summaryPrice').textContent = `${totalPrice.toLocaleString()} ₽`;
        document.getElementById('summaryTotal').textContent = `${totalPrice.toLocaleString()} ₽`;
    }

    function updateCartCount() {
        const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
        const cartCount = document.getElementById('cart-count');
        if (cartCount) cartCount.textContent = totalCount;
    }

    loadCart();
</script>

</body>
</html>
