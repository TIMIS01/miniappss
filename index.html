<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🛍️ PREMIUM SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Все стили из предыдущего варианта (без изменений, они уже были красивыми) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #1a1a1a;
            --text-secondary: #6c757d;
            --accent: #4361ee;
            --accent-light: #e9ecef;
            --success: #4CAF50;
            --danger: #f44336;
            --border: #dee2e6;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1a1a1a;
                --bg-secondary: #2d2d2d;
                --text-primary: #ffffff;
                --text-secondary: #a0a0a0;
                --accent: #6c8cff;
                --accent-light: #404040;
                --border: #404040;
                --shadow: 0 10px 30px rgba(0,0,0,0.3);
            }
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        .city-card {
            background: var(--gradient);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s;
            color: white;
        }

        .city-card:active {
            transform: scale(0.98);
        }

        .city-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .city-value {
            font-size: 28px;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .city-value span:last-child {
            font-size: 18px;
            opacity: 0.8;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 30px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
        }

        .close-btn:hover {
            background: var(--bg-secondary);
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .city-item {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .city-item.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 10px 20px -5px var(--accent);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin: 20px 0;
        }

        .product-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid var(--border);
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .product-image {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .product-info {
            padding: 16px;
        }

        .product-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .product-price {
            color: var(--accent);
            font-weight: 800;
            font-size: 20px;
        }

        .product-price::before {
            content: '₽';
            font-size: 14px;
            opacity: 0.7;
            margin-right: 2px;
        }

        .nav-bar {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 28px;
            cursor: pointer;
            padding: 0 10px 0 0;
            line-height: 1;
        }

        .nav-title {
            font-weight: 700;
            font-size: 18px;
            flex: 1;
        }

        .detail-card {
            background: var(--bg-secondary);
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .detail-image {
            width: 100%;
            height: 250px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }

        .detail-content {
            padding: 24px;
        }

        .detail-name {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .detail-price {
            font-size: 36px;
            font-weight: 900;
            color: var(--accent);
        }

        .detail-price::before {
            content: '₽';
            font-size: 24px;
            opacity: 0.7;
            margin-right: 4px;
        }

        .quantity-section {
            background: var(--bg-secondary);
            border-radius: 30px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .section-label {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label span {
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }

        .quantity-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .qty-btn {
            flex: 1;
            min-width: 70px;
            padding: 16px 8px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-primary);
            transition: 0.2s;
        }

        .qty-btn.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .promo-section {
            background: var(--bg-secondary);
            border-radius: 30px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .promo-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .promo-input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 20px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .promo-input:focus {
            border-color: var(--accent);
        }

        .promo-apply-btn {
            padding: 16px 28px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            white-space: nowrap;
        }

        .promo-apply-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .promo-status {
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .promo-status.success {
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
            border: 1px solid #4CAF50;
            display: block;
        }

        .promo-status.error {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
            border: 1px solid #f44336;
            display: block;
        }

        .promo-status.info {
            background: rgba(67, 97, 238, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            display: block;
        }

        .total-price {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: var(--gradient);
            border-radius: 30px;
            color: white;
            box-shadow: 0 15px 30px -10px var(--accent);
        }

        .price-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .old-price {
            text-decoration: line-through;
            opacity: 0.7;
            font-size: 24px;
            font-weight: 600;
        }

        .discount-badge {
            background: rgba(255, 255, 255, 0.25);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .confirmation {
            text-align: center;
            padding: 20px;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: scaleIn 0.5s;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .order-details {
            background: var(--bg-secondary);
            border-radius: 30px;
            padding: 24px;
            margin: 24px 0;
            text-align: left;
            border: 1px solid var(--border);
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .order-row:last-child {
            border-bottom: none;
        }

        .order-label {
            opacity: 0.7;
            font-weight: 500;
        }

        .order-value {
            font-weight: 700;
            font-size: 18px;
        }

        .discount-info {
            color: var(--success);
            font-weight: 700;
            font-size: 18px;
            margin: 20px 0;
            padding: 12px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 16px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Модальное окно выбора города -->
    <div class="modal" id="cityModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🏙️ Выберите город</h3>
                <button class="close-btn" id="closeCityModal">✕</button>
            </div>
            <div class="cities-grid" id="citiesGrid"></div>
            <button class="btn btn-primary" id="confirmCity">Подтвердить выбор</button>
        </div>
    </div>

    <!-- Главный экран -->
    <div id="mainScreen">
        <div class="city-card" id="citySelector">
            <div class="city-label">
                <span>📍 ТВОЙ ГОРОД</span>
            </div>
            <div class="city-value">
                <span id="selectedCity">Москва</span>
                <span>▼</span>
            </div>
        </div>

        <button class="btn btn-secondary" id="contactAdminMain">
            <span>📞</span> Связаться с администратором
        </button>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Экран товара -->
    <div id="productScreen" class="hidden">
        <div class="nav-bar">
            <button class="back-btn" id="backToCatalog">←</button>
            <span class="nav-title" id="productNavTitle">Товар</span>
        </div>
        
        <div class="detail-card">
            <div class="detail-image" id="productDetailImage"></div>
            <div class="detail-content">
                <div class="detail-name" id="productDetailName">Название</div>
                <div class="detail-price" id="productDetailPrice">0</div>
            </div>
        </div>

        <div class="quantity-section">
            <div class="section-label">
                📦 Количество
                <span>грамм</span>
            </div>
            <div class="quantity-buttons" id="quantityButtons"></div>
        </div>

        <div class="promo-section">
            <div class="section-label">🏷️ Промокод</div>
            <div class="promo-input-group">
                <input type="text" class="promo-input" id="promoInput" placeholder="Введите промокод" maxlength="20">
                <button class="promo-apply-btn" id="applyPromo">Применить</button>
            </div>
            <div class="promo-status" id="promoStatus"></div>
        </div>

        <div class="total-price" id="totalPrice">
            <div class="price-container">
                <span>0 ₽</span>
            </div>
        </div>

        <button class="btn btn-primary" id="orderBtn">
            ✅ Оформить заказ
        </button>
        <button class="btn btn-secondary" id="contactAdminProduct">
            📞 Связаться с администратором
        </button>
        <button class="btn btn-secondary" id="continueShoppingBtn">
            ⬅️ Продолжить покупки
        </button>
    </div>

    <!-- Экран подтверждения -->
    <div id="confirmationScreen" class="hidden">
        <div class="confirmation">
            <div class="success-icon">🎉</div>
            <h2>Заказ оформлен!</h2>
            
            <div class="order-details" id="orderDetails"></div>
            <div class="total-price" id="orderTotal">0 ₽</div>
            <div id="orderDiscount" class="discount-info"></div>

            <button class="btn btn-primary" id="continueAfterOrder">
                Продолжить покупки
            </button>
            <button class="btn btn-secondary" id="contactAfterOrder">
                📞 Связаться с администратором
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        if (tg.disableClosingConfirmation) tg.disableClosingConfirmation();

        const userId = tg.initDataUnsafe?.user?.id;
        console.log('User ID:', userId);

        const BOT_TOKEN = '8650034473:AAHOoD4BmYUBTrJCG1o2y8fMjabNIZN3hm8';
        const TELEGRAM_API_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

        const CITIES = ["Москва","Санкт-Петербург","Новосибирск","Екатеринбург","Казань","Нижний Новгород","Челябинск","Самара","Омск","Ростов-на-Дону","Уфа","Красноярск","Воронеж","Пермь","Волгоград"];
        const PRODUCTS = [
            {id:1,name:"Шишки",emoji:"🌰",price:3000,bgColor:"#43A047"},
            {id:2,name:"Гашиш",emoji:"🪴",price:3600,bgColor:"#7B5E3B"},
            {id:3,name:"Амфетамин",emoji:"💊",price:2200,bgColor:"#E53935"},
            {id:4,name:"Экстази",emoji:"🍃",price:1200,bgColor:"#8E24AA"},
            {id:5,name:"Меф",emoji:"🧂",price:1700,bgColor:"#FB8C00"},
            {id:6,name:"А-кристалл",emoji:"💎",price:5500,bgColor:"#1E88E5"},
            {id:7,name:"Психотропные грибы",emoji:"🍄",price:500,bgColor:"#6D4C41"},
            {id:8,name:"Лирика",emoji:"💧",price:8000,bgColor:"#039BE5"}
        ];

        let state = {
            city: localStorage.getItem('selectedCity') || 'Москва',
            selectedProduct: null,
            quantity: 1,
            appliedPromo: null,
            pendingRequests: {}
        };

        function loadStoredPromo() {
            const stored = localStorage.getItem('activePromo');
            if (stored) {
                try {
                    const promo = JSON.parse(stored);
                    if (Date.now() - promo.timestamp < 3600000) {
                        state.appliedPromo = {code: promo.code, discount: promo.discount};
                    } else {
                        localStorage.removeItem('activePromo');
                    }
                } catch { localStorage.removeItem('activePromo'); }
            }
        }
        function savePromoToStorage(code, discount) {
            localStorage.setItem('activePromo', JSON.stringify({code, discount, timestamp: Date.now()}));
        }
        function clearStoredPromo() { localStorage.removeItem('activePromo'); }

        // Города
        function renderCities() {
            const grid = document.getElementById('citiesGrid');
            grid.innerHTML = CITIES.map(c => `<div class="city-item ${c===state.city?'selected':''}" onclick="selectCity('${c}')">${c}</div>`).join('');
        }
        window.selectCity = function(city) {
            state.city = city;
            document.querySelectorAll('.city-item').forEach(el => {
                el.classList.toggle('selected', el.textContent.trim()===city);
            });
        };
        function openCityModal() { renderCities(); document.getElementById('cityModal').classList.add('show'); }
        function closeCityModal() { document.getElementById('cityModal').classList.remove('show'); }

        // Товары
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = PRODUCTS.map(p => `
                <div class="product-card" onclick="selectProduct(${p.id})">
                    <div class="product-image" style="background:${p.bgColor};display:flex;align-items:center;justify-content:center;">
                        <span style="font-size:48px;">${p.emoji}</span>
                    </div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }
        window.selectProduct = function(id) {
            state.selectedProduct = PRODUCTS.find(p=>p.id===id);
            state.quantity = 1;
            const p = state.selectedProduct;
            document.getElementById('productDetailImage').innerHTML = `<span>${p.emoji}</span>`;
            document.getElementById('productDetailImage').style.background = p.bgColor;
            document.getElementById('productDetailName').textContent = p.name;
            document.getElementById('productDetailPrice').textContent = p.price.toLocaleString();
            document.getElementById('productNavTitle').textContent = p.name;
            const qtyDiv = document.getElementById('quantityButtons');
            qtyDiv.innerHTML = '';
            for (let i=1;i<=5;i++) {
                const btn = document.createElement('button');
                btn.className = `qty-btn ${i===1?'selected':''}`;
                btn.textContent = i+'г';
                btn.onclick = ()=>setQuantity(i);
                qtyDiv.appendChild(btn);
            }
            document.getElementById('promoInput').value = '';
            document.getElementById('promoStatus').style.display = 'none';
            updatePrice();
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('productScreen').classList.remove('hidden');
        };
        function setQuantity(qty) {
            state.quantity = qty;
            document.querySelectorAll('.qty-btn').forEach((b,i)=>b.classList.toggle('selected', i+1===qty));
            updatePrice();
        }
        function updatePrice() {
            if (!state.selectedProduct) return;
            const base = state.selectedProduct.price * state.quantity;
            let final = base;
            const priceDiv = document.getElementById('totalPrice');
            if (state.appliedPromo) {
                const disc = Math.round(base * state.appliedPromo.discount/100);
                final = base - disc;
                priceDiv.innerHTML = `<div class="price-container"><span class="old-price">${base.toLocaleString()} ₽</span><span>${final.toLocaleString()} ₽</span><span class="discount-badge">-${state.appliedPromo.discount}%</span></div>`;
            } else {
                priceDiv.innerHTML = `<div class="price-container"><span>${base.toLocaleString()} ₽</span></div>`;
            }
        }

        // Промокоды
        async function applyPromo() {
            const input = document.getElementById('promoInput');
            const code = input.value.trim().toUpperCase();
            if (!code) return showPromoStatus('Введите промокод','error');
            if (!state.selectedProduct) return showPromoStatus('Сначала выберите товар','error');
            const applyBtn = document.getElementById('applyPromo');
            applyBtn.disabled = true;
            showPromoStatus('Проверка промокода...','info');

            const requestId = Date.now() + '_' + Math.random().toString(36);
            state.pendingRequests[requestId] = (response) => {
                delete state.pendingRequests[requestId];
                applyBtn.disabled = false;
                if (response.success) {
                    state.appliedPromo = {code, discount: response.discount};
                    savePromoToStorage(code, response.discount);
                    showPromoStatus(`✅ Промокод применен! Скидка ${response.discount}%`,'success');
                    updatePrice();
                } else {
                    showPromoStatus(response.error || '❌ Неверный промокод','error');
                    state.appliedPromo = null;
                    clearStoredPromo();
                    updatePrice();
                }
            };

            if (userId) {
                const msgData = {action:'check_promo', requestId, userId, code, productId: state.selectedProduct.id};
                try {
                    const res = await fetch(TELEGRAM_API_URL, {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({chat_id: userId, text: JSON.stringify(msgData)})
                    });
                    const result = await res.json();
                    if (!result.ok) throw new Error(result.description);
                } catch (e) {
                    console.error(e);
                    showPromoStatus('❌ Ошибка соединения','error');
                    applyBtn.disabled = false;
                    delete state.pendingRequests[requestId];
                }
                setTimeout(() => {
                    if (state.pendingRequests[requestId]) {
                        delete state.pendingRequests[requestId];
                        applyBtn.disabled = false;
                        showPromoStatus('❌ Таймаут ответа от бота','error');
                    }
                }, 15000);
            } else {
                // fallback (тест вне Telegram) – закроется
                tg.sendData(JSON.stringify({action:'check_promo', requestId, code, productId: state.selectedProduct.id}));
                showPromoStatus('⏳ Запрос отправлен, приложение закроется...','info');
                setTimeout(()=>{ applyBtn.disabled=false; }, 5000);
            }
        }
        function showPromoStatus(msg, type) {
            const s = document.getElementById('promoStatus');
            s.className = `promo-status ${type}`;
            s.textContent = msg;
            s.style.display = 'block';
            if (type==='success') setTimeout(()=>s.style.display='none',3000);
        }

        // Заказ
        function placeOrder() {
            if (!state.selectedProduct) return;
            const base = state.selectedProduct.price * state.quantity;
            const final = state.appliedPromo ? base - Math.round(base * state.appliedPromo.discount/100) : base;
            const orderData = {
                action: 'order',
                userId: userId || 0,
                productId: state.selectedProduct.id,
                productName: state.selectedProduct.name,
                quantity: state.quantity,
                basePrice: state.selectedProduct.price,
                baseTotal: base,
                finalTotal: final,
                city: state.city,
                promoCode: state.appliedPromo?.code || null,
                discount: state.appliedPromo?.discount || 0
            };
            document.getElementById('productScreen').classList.add('hidden');
            document.getElementById('confirmationScreen').classList.remove('hidden');
            let discountHtml = '';
            if (state.appliedPromo) {
                discountHtml = `
                    <div class="order-row"><span class="order-label">🏷️ Промокод:</span><span class="order-value">${state.appliedPromo.code} (-${state.appliedPromo.discount}%)</span></div>
                    <div class="order-row"><span class="order-label">💰 Экономия:</span><span class="order-value">${(base-final).toLocaleString()} ₽</span></div>
                `;
            }
            document.getElementById('orderDetails').innerHTML = `
                <div class="order-row"><span class="order-label">🏙️ Город:</span><span class="order-value">${state.city}</span></div>
                <div class="order-row"><span class="order-label">📦 Товар:</span><span class="order-value">${state.selectedProduct.name}</span></div>
                <div class="order-row"><span class="order-label">📊 Количество:</span><span class="order-value">${state.quantity} г</span></div>
                <div class="order-row"><span class="order-label">💰 Цена за г:</span><span class="order-value">${state.selectedProduct.price.toLocaleString()} ₽</span></div>
                ${discountHtml}
            `;
            document.getElementById('orderTotal').innerHTML = `${final.toLocaleString()} ₽`;
            document.getElementById('orderDiscount').innerHTML = state.appliedPromo ? `🎉 Промокод ${state.appliedPromo.code} применен!` : '';
            tg.sendData(JSON.stringify(orderData));
        }

        // Связь с админом
        function contactAdmin() {
            tg.sendData(JSON.stringify({action:'contact_admin', userId: userId||0, city: state.city}));
            tg.showPopup({title:'📞 Запрос отправлен', message:'Администратор свяжется с вами', buttons:[{type:'ok'}]});
        }

        function goToMain() {
            document.getElementById('productScreen').classList.add('hidden');
            document.getElementById('confirmationScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
        }

        function handleBotMessage(event) {
            try {
                const data = JSON.parse(event.data);
                if (data.action==='promo_response' && data.requestId && state.pendingRequests[data.requestId]) {
                    state.pendingRequests[data.requestId](data);
                }
            } catch (e) {}
        }

        function init() {
            loadStoredPromo();
            document.getElementById('selectedCity').textContent = state.city;
            document.getElementById('citySelector').addEventListener('click', openCityModal);
            document.getElementById('closeCityModal').addEventListener('click', closeCityModal);
            document.getElementById('confirmCity').addEventListener('click', ()=>{
                localStorage.setItem('selectedCity', state.city);
                document.getElementById('selectedCity').textContent = state.city;
                closeCityModal();
            });
            document.getElementById('cityModal').addEventListener('click', e=>{ if(e.target===document.getElementById('cityModal')) closeCityModal(); });
            renderProducts();
            document.getElementById('contactAdminMain').addEventListener('click', contactAdmin);
            document.getElementById('contactAdminProduct').addEventListener('click', contactAdmin);
            document.getElementById('contactAfterOrder').addEventListener('click', contactAdmin);
            document.getElementById('backToCatalog').addEventListener('click', goToMain);
            document.getElementById('continueShoppingBtn').addEventListener('click', goToMain);
            document.getElementById('continueAfterOrder').addEventListener('click', goToMain);
            document.getElementById('applyPromo').addEventListener('click', applyPromo);
            document.getElementById('promoInput').addEventListener('keypress', e=>{ if(e.key==='Enter') applyPromo(); });
            document.getElementById('orderBtn').addEventListener('click', placeOrder);
            tg.onEvent('message', handleBotMessage);
            console.log('✅ Приложение готово');
        }
        init();
    </script>
</body>
</html>
